<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>生成AIパスポート 学習アプリ</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f14; --surface: #1a1a24; --surface2: #22222f;
    --accent: #7c6af7; --accent2: #f7c26a;
    --text: #e8e8f0; --text-muted: #888899;
    --success: #6af7a8; --error: #f76a6a;
    --border: rgba(124,106,247,0.2);
    --memory-color: #f76af0; --understand-color: #6ab8f7;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    padding: 20px;
    background-image:
      radial-gradient(ellipse at 20% 20%, rgba(124,106,247,0.08) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 80%, rgba(247,194,106,0.05) 0%, transparent 60%);
  }
  .app { width:100%; max-width:680px; }

  .header { text-align:center; margin-bottom:24px; animation: fadeDown 0.6s ease; }
  .header-badge {
    display:inline-block; background:rgba(124,106,247,0.15); border:1px solid var(--border);
    color:var(--accent); font-size:11px; font-weight:700; letter-spacing:3px;
    padding:6px 16px; border-radius:20px; margin-bottom:12px; text-transform:uppercase;
  }
  .header h1 { font-family:'Noto Serif JP',serif; font-size:22px; font-weight:700; line-height:1.5; }

  /* 進捗 */
  .progress-wrap { margin-bottom:24px; animation: fadeDown 0.6s ease 0.05s both; }
  .progress-meta { display:flex; justify-content:space-between; font-size:12px; color:var(--text-muted); margin-bottom:8px; }
  .progress-bar { height:4px; background:var(--surface2); border-radius:4px; overflow:hidden; }
  .progress-fill { height:100%; background:linear-gradient(90deg,var(--accent),var(--accent2)); border-radius:4px; transition:width 0.5s ease; }

  /* ステップインジケーター */
  .steps { display:flex; align-items:center; justify-content:center; margin-bottom:24px; animation: fadeDown 0.6s ease 0.1s both; }
  .step { display:flex; flex-direction:column; align-items:center; gap:6px; }
  .step-num {
    width:36px; height:36px; border-radius:50%; display:flex; align-items:center; justify-content:center;
    font-size:13px; font-weight:700; border:2px solid var(--surface2); background:var(--surface); color:var(--text-muted);
    transition:all 0.4s ease;
  }
  .step-label { font-size:10px; color:var(--text-muted); white-space:nowrap; transition:color 0.4s ease; }
  .step.active .step-num { background:var(--accent); border-color:var(--accent); color:white; box-shadow:0 0 20px rgba(124,106,247,0.4); }
  .step.active .step-label { color:var(--accent); }
  .step.done .step-num { background:rgba(106,247,168,0.15); border-color:var(--success); color:var(--success); }
  .step.done .step-label { color:var(--success); }
  .step-line { width:40px; height:2px; background:var(--surface2); margin-bottom:20px; transition:background 0.4s ease; }
  .step-line.done { background:rgba(106,247,168,0.3); }

  /* カード */
  .card {
    background:var(--surface); border:1px solid var(--border); border-radius:20px;
    padding:36px; animation:fadeUp 0.5s ease; position:relative; overflow:hidden;
  }
  .card::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; background:linear-gradient(90deg,var(--accent),var(--accent2)); opacity:0.6; }

  /* 深掘りカード */
  .deepdive-card {
    background:var(--surface); border:1px solid rgba(247,194,106,0.25); border-radius:20px;
    padding:36px; animation:fadeUp 0.5s ease; position:relative; overflow:hidden;
  }
  .deepdive-card::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; background:linear-gradient(90deg,var(--accent2),#f7a06a); }

  /* タグ類 */
  .step-tag {
    display:inline-flex; align-items:center; gap:8px; font-size:11px; font-weight:700; letter-spacing:2px;
    padding:5px 14px; border-radius:20px; margin-bottom:20px; text-transform:uppercase;
    background:rgba(124,106,247,0.1); border:1px solid rgba(124,106,247,0.3); color:var(--accent);
  }
  .step-tag.s2 { background:rgba(247,194,106,0.1); border-color:rgba(247,194,106,0.3); color:var(--accent2); }
  .step-tag.s3 { background:rgba(124,106,247,0.1); border-color:rgba(124,106,247,0.3); color:var(--accent); }
  .step-tag.s4 { background:rgba(106,247,168,0.1); border-color:rgba(106,247,168,0.3); color:var(--success); }
  .deepdive-tag {
    display:inline-flex; align-items:center; gap:8px; font-size:11px; font-weight:700; letter-spacing:2px;
    padding:5px 14px; border-radius:20px; margin-bottom:20px; text-transform:uppercase;
    background:rgba(247,194,106,0.1); border:1px solid rgba(247,194,106,0.35); color:var(--accent2);
  }

  /* 問題 */
  .q-meta { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; }
  .q-num { font-size:12px; color:var(--text-muted); }
  .q-chapter { font-size:11px; color:var(--accent); background:rgba(124,106,247,0.1); padding:3px 10px; border-radius:10px; }
  .question-label { font-size:11px; color:var(--text-muted); letter-spacing:2px; text-transform:uppercase; margin-bottom:10px; }
  .question-text {
    font-family:'Noto Serif JP',serif; font-size:16px; line-height:1.9;
    margin-bottom:24px; padding:20px; background:var(--surface2);
    border-radius:12px; border-left:3px solid var(--accent);
  }

  /* 選択肢 */
  .choices { display:flex; flex-direction:column; gap:10px; margin-bottom:24px; }
  .choice {
    display:flex; align-items:center; gap:14px; padding:14px 18px;
    background:var(--surface2); border:1px solid rgba(255,255,255,0.06);
    border-radius:12px; font-size:14px; color:var(--text-muted); transition:all 0.2s ease;
  }
  .choice.clickable { cursor:pointer; }
  .choice.clickable:hover { border-color:rgba(124,106,247,0.4); background:rgba(124,106,247,0.08); color:var(--text); transform:translateX(4px); }
  .choice.selected { border-color:var(--accent); background:rgba(124,106,247,0.12); color:var(--text); }
  .choice.correct { border-color:var(--success); background:rgba(106,247,168,0.1); color:var(--success); }
  .choice.wrong { border-color:var(--error); background:rgba(247,106,106,0.1); color:var(--error); }
  .choice-num {
    width:26px; height:26px; border-radius:50%; background:rgba(255,255,255,0.06);
    display:flex; align-items:center; justify-content:center;
    font-size:12px; font-weight:700; flex-shrink:0; transition:all 0.2s ease;
  }
  .choice.selected .choice-num { background:var(--accent); color:white; }
  .choice.correct .choice-num { background:var(--success); color:#0f0f14; }
  .choice.wrong .choice-num { background:var(--error); color:white; }

  /* 解説ボックス */
  .simple-explanation { background:var(--surface2); border-radius:14px; padding:24px; margin-bottom:24px; }
  .explanation-title {
    font-size:12px; font-weight:700; color:var(--accent2); letter-spacing:2px; text-transform:uppercase;
    margin-bottom:14px; display:flex; align-items:center; gap:8px;
  }
  .explanation-title::before { content:''; width:4px; height:16px; background:var(--accent2); border-radius:2px; display:inline-block; }
  .explanation-text { font-size:15px; line-height:1.9; }
  .explanation-text strong { color:var(--accent2); }

  /* 分岐ボタン */
  .branch-buttons { display:flex; flex-direction:column; gap:12px; }
  .btn-branch-ok {
    width:100%; padding:16px; border:none; border-radius:12px;
    font-size:15px; font-weight:700; font-family:'Noto Sans JP',sans-serif; cursor:pointer; transition:all 0.2s ease;
    background:linear-gradient(135deg,var(--accent),#9b8df8); color:white; box-shadow:0 4px 20px rgba(124,106,247,0.3);
  }
  .btn-branch-ok:hover { transform:translateY(-2px); box-shadow:0 8px 28px rgba(124,106,247,0.4); }
  .btn-branch-more {
    width:100%; padding:14px; border-radius:12px;
    font-size:14px; font-weight:700; font-family:'Noto Sans JP',sans-serif; cursor:pointer; transition:all 0.2s ease;
    background:transparent; border:2px solid rgba(247,194,106,0.4); color:var(--accent2);
  }
  .btn-branch-more:hover { background:rgba(247,194,106,0.08); border-color:var(--accent2); transform:translateY(-2px); }

  /* ストーリーブロック */
  .story-block {
    background:linear-gradient(135deg,rgba(124,106,247,0.08),rgba(247,194,106,0.05));
    border:1px solid rgba(124,106,247,0.2); border-radius:14px; padding:24px; margin-bottom:20px; position:relative;
  }
  .story-block::before { content:'📖'; font-size:20px; position:absolute; top:-12px; left:20px; background:var(--surface); padding:0 8px; }
  .story-lead { font-family:'Noto Serif JP',serif; font-size:17px; font-weight:700; color:var(--accent2); line-height:1.6; margin-bottom:16px; }
  .story-text { font-size:15px; line-height:2; color:var(--text); }
  .story-text strong { color:var(--accent2); }
  .story-text em { color:var(--success); font-style:normal; font-weight:700; }
  .quote-block {
    border-left:3px solid var(--accent2); padding:14px 20px;
    background:rgba(247,194,106,0.06); border-radius:0 10px 10px 0;
    margin:16px 0; font-family:'Noto Serif JP',serif; font-size:16px; color:var(--accent2); line-height:1.8;
  }

  /* 学習アドバイスボックス */
  .advice-box { border-radius:14px; padding:24px; margin-bottom:24px; border:2px solid; }
  .advice-box.memory-type { background:rgba(247,106,240,0.06); border-color:rgba(247,106,240,0.35); }
  .advice-box.understand-type { background:rgba(106,184,247,0.06); border-color:rgba(106,184,247,0.35); }
  .advice-header { display:flex; align-items:center; gap:10px; margin-bottom:16px; }
  .advice-badge { font-size:11px; font-weight:700; letter-spacing:1px; padding:4px 12px; border-radius:20px; text-transform:uppercase; }
  .memory-type .advice-badge { background:rgba(247,106,240,0.2); color:var(--memory-color); }
  .understand-type .advice-badge { background:rgba(106,184,247,0.2); color:var(--understand-color); }
  .advice-header-text { font-size:14px; font-weight:700; color:var(--text); }
  .keyword-list { display:flex; flex-wrap:wrap; gap:10px; margin-top:4px; }
  .keyword-item {
    display:flex; align-items:center; gap:8px;
    background:rgba(247,106,240,0.1); border:1px solid rgba(247,106,240,0.3);
    border-radius:10px; padding:8px 14px;
  }
  .keyword-num { font-size:11px; color:var(--memory-color); font-weight:700; }
  .keyword-text { font-size:14px; font-weight:700; color:var(--text); }
  .keyword-note { font-size:12px; color:var(--text-muted); margin-top:2px; }
  .advice-text { font-size:14px; line-height:1.9; color:var(--text); }
  .advice-text strong { color:var(--understand-color); }

  /* 結果 */
  .result-box { text-align:center; padding:16px 0; margin-bottom:20px; }
  .result-icon { font-size:48px; margin-bottom:10px; display:block; animation:popIn 0.5s cubic-bezier(0.34,1.56,0.64,1); }
  .result-title { font-family:'Noto Serif JP',serif; font-size:22px; font-weight:700; margin-bottom:6px; }
  .result-title.correct { color:var(--success); }
  .result-title.wrong { color:var(--error); }
  .result-message { font-size:13px; color:var(--text-muted); line-height:1.7; }

  /* 完了画面 */
  .complete-box { text-align:center; padding:20px 0; }
  .complete-icon { font-size:64px; margin-bottom:16px; display:block; animation:popIn 0.6s cubic-bezier(0.34,1.56,0.64,1); }
  .complete-title { font-family:'Noto Serif JP',serif; font-size:26px; font-weight:700; color:var(--accent2); margin-bottom:20px; }
  .score-detail { display:flex; justify-content:center; gap:28px; margin-bottom:24px; }
  .score-item { text-align:center; }
  .score-item-num { font-size:36px; font-weight:700; }
  .score-item-label { font-size:11px; color:var(--text-muted); margin-top:4px; }
  .complete-message { font-size:14px; color:var(--text-muted); line-height:1.9; margin-bottom:28px; white-space:pre-line; }

  /* ボタン */
  .btn { width:100%; padding:16px; border:none; border-radius:12px; font-size:15px; font-weight:700; font-family:'Noto Sans JP',sans-serif; cursor:pointer; transition:all 0.2s ease; letter-spacing:0.5px; }
  .btn-primary { background:linear-gradient(135deg,var(--accent),#9b8df8); color:white; box-shadow:0 4px 20px rgba(124,106,247,0.3); }
  .btn-primary:hover { transform:translateY(-2px); box-shadow:0 8px 28px rgba(124,106,247,0.4); }
  .btn-secondary { background:var(--surface2); color:var(--text); border:1px solid rgba(255,255,255,0.1); }
  .btn-secondary:hover { border-color:var(--accent); color:var(--accent); }
  .btn-success { background:linear-gradient(135deg,#3ab87a,var(--success)); color:#0f0f14; box-shadow:0 4px 20px rgba(106,247,168,0.3); }
  .btn-success:hover { transform:translateY(-2px); }
  .btn-gold { background:linear-gradient(135deg,#e8a020,var(--accent2)); color:#0f0f14; box-shadow:0 4px 20px rgba(247,194,106,0.3); }
  .btn-gold:hover { transform:translateY(-2px); }

  .hint { text-align:center; font-size:12px; color:var(--text-muted); margin-bottom:16px; line-height:1.6; }
  .hidden { display:none; }
  @keyframes fadeDown { from{opacity:0;transform:translateY(-16px)} to{opacity:1;transform:translateY(0)} }
  @keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
  @keyframes popIn { from{transform:scale(0);opacity:0} to{transform:scale(1);opacity:1} }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-badge">🎓 生成AIパスポート対策 第1章</div>
    <h1>わかった！を積み重ねる<br>4ステップ学習法</h1>
  </div>
  <div class="progress-wrap">
    <div class="progress-meta"><span id="progressLabel">問題 1 / 5</span><span id="progressPct">0%</span></div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  </div>
  <div class="steps">
    <div class="step active" id="stepDot1"><div class="step-num">1</div><div class="step-label">問題</div></div>
    <div class="step-line" id="line1"></div>
    <div class="step" id="stepDot2"><div class="step-num">2</div><div class="step-label">解説</div></div>
    <div class="step-line" id="line2"></div>
    <div class="step" id="stepDot3"><div class="step-num">3</div><div class="step-label">再挑戦</div></div>
    <div class="step-line" id="line3"></div>
    <div class="step" id="stepDot4"><div class="step-num">4</div><div class="step-label">答え合わせ</div></div>
  </div>

  <!-- STEP1 -->
  <div class="card" id="step1">
    <div class="step-tag">STEP 1 ── まず問題を見てみよう</div>
    <div class="q-meta"><span class="q-num" id="s1-qnum"></span><span class="q-chapter" id="s1-chapter"></span></div>
    <div class="question-label">問題文</div>
    <div class="question-text" id="s1-qtext"></div>
    <div class="choices" id="s1-choices"></div>
    <p class="hint">💡 答えを選ばなくてOK。まず選択肢に目を通してみよう</p>
    <button class="btn btn-primary" onclick="showStep2()">解説を読む →</button>
  </div>

  <!-- STEP2 シンプル解説 -->
  <div class="card hidden" id="step2">
    <div class="step-tag s2">STEP 2 ── まず仕組みを理解しよう</div>
    <div class="question-text" id="s2-qtext"></div>
    <div class="simple-explanation">
      <div class="explanation-title">かんたん解説</div>
      <div class="explanation-text" id="s2-simple"></div>
    </div>
    <div class="branch-buttons">
      <button class="btn-branch-more" onclick="showDeepDive()">🔍 もっと深く知りたい</button>
      <button class="btn-branch-ok" onclick="showStep3()">なるほど！　問題を解く →</button>
    </div>
  </div>

  <!-- 深掘り解説 -->
  <div class="deepdive-card hidden" id="stepDeepDive">
    <div class="deepdive-tag">🔍 深掘り解説 ── もっと知りたい人へ</div>
    <div id="deepdive-content"></div>
    <p class="hint" id="deepdive-hint"></p>
    <button class="btn btn-primary" onclick="showStep3()">問題を解く →</button>
  </div>

  <!-- STEP3 -->
  <div class="card hidden" id="step3">
    <div class="step-tag s3">STEP 3 ── 今度はどうかな？</div>
    <div class="q-meta"><span class="q-num" id="s3-qnum"></span><span class="q-chapter" id="s3-chapter"></span></div>
    <div class="question-label">問題文</div>
    <div class="question-text" id="s3-qtext"></div>
    <div class="choices" id="s3-choices"></div>
    <button class="btn btn-secondary hidden" id="answerBtn" onclick="showResult()">答え合わせをする →</button>
    <button class="btn-back-to-explanation" onclick="showStep2()" style="width:100%;margin-top:12px;padding:12px;border:none;border-radius:12px;font-size:13px;font-weight:700;font-family:'Noto Sans JP',sans-serif;cursor:pointer;transition:all 0.2s ease;background:transparent;border:1px solid rgba(255,255,255,0.1);color:var(--text-muted);" onmouseover="this.style.color='var(--accent2)';this.style.borderColor='rgba(247,194,106,0.4)'" onmouseout="this.style.color='var(--text-muted)';this.style.borderColor='rgba(255,255,255,0.1)'">
      ← 解説をもう一度確認する
    </button>
  </div>

  <!-- STEP4 -->
  <div class="card hidden" id="step4">
    <div class="step-tag s4">STEP 4 ── 答え合わせ</div>
    <div class="result-box" id="resultBox"></div>
    <div class="choices" id="s4-choices"></div>
    <div class="simple-explanation">
      <div class="explanation-title">解説まとめ</div>
      <div class="explanation-text" id="s4-summary"></div>
    </div>
    <button class="btn btn-success" id="nextBtn" onclick="nextQuestion()">次の問題へ進む →</button>
  </div>

  <!-- 完了画面 -->
  <div class="card hidden" id="stepComplete">
    <div class="complete-box">
      <span class="complete-icon">🎓</span>
      <div class="complete-title">第1章 完了！</div>
      <div class="score-detail">
        <div class="score-item"><div class="score-item-num" id="correctCount" style="color:var(--success)">0</div><div class="score-item-label">正解</div></div>
        <div class="score-item"><div class="score-item-num" style="color:var(--text-muted)">／</div><div class="score-item-label">　</div></div>
        <div class="score-item"><div class="score-item-num" style="color:var(--text)">5</div><div class="score-item-label">問</div></div>
        <div class="score-item"><div class="score-item-num" id="wrongCount" style="color:var(--error)">0</div><div class="score-item-label">不正解</div></div>
      </div>
      <div class="complete-message" id="completeMessage"></div>
      <button class="btn btn-gold" onclick="restartQuiz()">もう一度チャレンジする 🔄</button>
    </div>
  </div>
</div>

<script>
// ============================================================
// 問題データ
// ============================================================
const questions = [
  {
    chapter: '第1章 AIの定義',
    question: '1956年に開催され、「人工知能（AI）」という言葉が初めて使われたとされる会議の名称として、最も適切なものを選べ。',
    choices: ['チューリング会議','ダートマス会議','シリコンバレー会議','MIT人工知能サミット'],
    correct: 1,
    simple: `「AI（人工知能）」という言葉は、<strong>1956年にアメリカで開かれた「ダートマス会議」</strong>で初めて使われました。提唱したのは<strong>ジョン・マッカーシー</strong>という研究者で、この会議がAI研究という分野の出発点とされています。`,
    deepdive: `
      <div class="story-block">
        <div class="story-lead">1956年の夏、山の中に研究者たちが集まった。</div>
        <div class="story-text">
          舞台はアメリカ・ニューハンプシャー州の山の中にある<strong>ダートマス大学</strong>。当時28歳の若き研究者<strong>ジョン・マッカーシー</strong>を中心に、4〜10人の研究者たちが<em>約2ヶ月間、泊まり込みで</em>議論を続けました。<br><br>
          当時コンピューターはまだ「計算機」でしかありませんでした。「考える機械を作ろう」という発想は、周囲から「SF映画の話か？」と思われるほど突拍子もないアイデアでした。
        </div>
        <div class="quote-block">「人間のように考える機械を作れるはずだ」</div>
        <div class="story-text">
          この会議で初めて<strong>「Artificial Intelligence（人工知能）」</strong>という言葉が公式に使われ、AI研究という分野が誕生しました。<br><br>

// ============================================================
// 状態
// ============================================================
let currentQ = 0, selectedIdx = null, correctCount = 0, wrongCount = 0;

// ============================================================
// 初期化
// ============================================================
function init() {
  currentQ = 0; selectedIdx = null; correctCount = 0; wrongCount = 0;
  loadQuestion(0);
  showScreen('step1');
  updateStepIndicator(1);
  updateProgress();
}

function loadQuestion(idx) {
  const q = questions[idx];
  const total = questions.length;
  // STEP1
  document.getElementById('s1-qnum').textContent = `問題 ${idx+1} / ${total}`;
  document.getElementById('s1-chapter').textContent = q.chapter;
  document.getElementById('s1-qtext').textContent = q.question;
  renderChoices('s1-choices', q.choices, false);
  // STEP2
  document.getElementById('s2-qtext').textContent = q.question;
  document.getElementById('s2-simple').innerHTML = q.simple;
  // 深掘り
  document.getElementById('deepdive-content').innerHTML = q.deepdive;
  document.getElementById('deepdive-hint').textContent = q.deepdive_hint;
  // STEP3
  document.getElementById('s3-qnum').textContent = `問題 ${idx+1} / ${total}`;
  document.getElementById('s3-chapter').textContent = q.chapter;
  document.getElementById('s3-qtext').textContent = q.question;
  renderChoices('s3-choices', q.choices, true);
  selectedIdx = null;
  document.getElementById('answerBtn').classList.add('hidden');
}

function renderChoices(cid, choices, clickable) {
  const c = document.getElementById(cid);
  c.innerHTML = '';
  choices.forEach((text, i) => {
    const d = document.createElement('div');
    d.className = 'choice' + (clickable ? ' clickable' : '');
    d.id = cid + '-c' + i;
    if (clickable) d.onclick = () => selectChoice(i);
    d.innerHTML = `<div class="choice-num">${i+1}</div><span>${text}</span>`;
    c.appendChild(d);
  });
}

// ============================================================
// 画面切り替え
// ============================================================
const allScreens = ['step1','step2','stepDeepDive','step3','step4','stepComplete'];
function showScreen(id) {
  allScreens.forEach(s => document.getElementById(s).classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
  window.scrollTo({top:0, behavior:'smooth'});
}

function showStep2()    { showScreen('step2');       updateStepIndicator(2); }
function showDeepDive() { showScreen('stepDeepDive'); updateStepIndicator(2); }
function showStep3() {
  showScreen('step3'); updateStepIndicator(3);
  selectedIdx = null;
  const choices = document.querySelectorAll('#s3-choices .choice');
  choices.forEach(c => c.className = 'choice clickable');
  document.getElementById('answerBtn').classList.add('hidden');
}

function updateStepIndicator(cur) {
  for (let i=1;i<=4;i++) {
    const d = document.getElementById('stepDot'+i);
    d.className='step';
    if(i<cur) d.classList.add('done');
    if(i===cur) d.classList.add('active');
  }
  for (let i=1;i<=3;i++) {
    const l = document.getElementById('line'+i);
    l.className='step-line';
    if(i<cur) l.classList.add('done');
  }
}

function updateProgress() {
  const pct = Math.round((currentQ / questions.length) * 100);
  document.getElementById('progressLabel').textContent = `問題 ${currentQ+1} / ${questions.length}`;
  document.getElementById('progressPct').textContent = pct + '%';
  document.getElementById('progressFill').style.width = pct + '%';
}

// ============================================================
// 選択・答え合わせ
// ============================================================
function selectChoice(idx) {
  selectedIdx = idx;
  const choices = document.querySelectorAll('#s3-choices .choice');
  choices.forEach(c => c.className = 'choice clickable');
  choices[idx].classList.add('selected');
  document.getElementById('answerBtn').classList.remove('hidden');
}

function showResult() {
  const q = questions[currentQ];
  const isCorrect = selectedIdx === q.correct;
  if (isCorrect) correctCount++; else wrongCount++;

  document.getElementById('resultBox').innerHTML = isCorrect
    ? `<span class="result-icon">🎉</span><div class="result-title correct">正解！</div><div class="result-message">解説を読んでから解くと、スッと答えが見えてきますよね。<br>これが「わかった！」の体験です。</div>`
    : `<span class="result-icon">💡</span><div class="result-title wrong">惜しい！</div><div class="result-message">大丈夫！解説まとめをもう一度読んで定着させましょう。</div>`;

  const s4 = document.getElementById('s4-choices');
  s4.innerHTML = '';
  q.choices.forEach((text, i) => {
    const d = document.createElement('div');
    if (i === q.correct) { d.className='choice correct'; d.innerHTML=`<div class="choice-num">${i+1}</div><span>${text} ✓</span>`; }
    else if (i === selectedIdx && !isCorrect) { d.className='choice wrong'; d.innerHTML=`<div class="choice-num">${i+1}</div><span>${text} ✗</span>`; }
    else { d.className='choice'; d.innerHTML=`<div class="choice-num">${i+1}</div><span>${text}</span>`; }
    s4.appendChild(d);
  });

  document.getElementById('s4-summary').innerHTML = q.summary;

  const nb = document.getElementById('nextBtn');
  if (currentQ === questions.length-1) { nb.textContent='結果を見る 🎓'; nb.className='btn btn-gold'; }
  else { nb.textContent='次の問題へ進む →'; nb.className='btn btn-success'; }

  showScreen('step4'); updateStepIndicator(4);
}

function nextQuestion() {
  if (currentQ === questions.length-1) { showComplete(); return; }
  currentQ++;
  loadQuestion(currentQ);
  updateProgress();
  showScreen('step1');
  updateStepIndicator(1);
}

function showComplete() {
  document.getElementById('correctCount').textContent = correctCount;
  document.getElementById('wrongCount').textContent = wrongCount;
  const pct = correctCount / questions.length;
  let msg = pct===1
    ? '全問正解！素晴らしいです🎉\n第1章の内容はバッチリです。第2章へ進みましょう！'
    : pct>=0.8 ? 'とてもよくできました！\n間違えた問題だけもう一度確認してみましょう。'
    : pct>=0.6 ? 'まずまずです！\n間違えた問題の解説を読み直してから、もう一度チャレンジを。'
    : 'もう一度チャレンジしてみましょう！\n深掘り解説をじっくり読んでから再挑戦すると定着します。';
  document.getElementById('completeMessage').textContent = msg;
  document.getElementById('progressLabel').textContent = '完了！';
  document.getElementById('progressPct').textContent = '100%';
  document.getElementById('progressFill').style.width = '100%';
  showScreen('stepComplete');
}

function restartQuiz() { init(); }

init();
</script>
