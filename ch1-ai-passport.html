<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="light only">
<title>生成AIパスポート 第1章 AIの基礎</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&family=Shippori+Mincho:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #fdf8f5;
    --surface: #ffffff;
    --surface2: #fef3f0;
    --surface3: #f0f7f4;
    --pink: #f4a7b9;
    --pink-light: #fde8ee;
    --pink-deep: #e8849a;
    --mint: #a8d5c2;
    --mint-light: #e6f5ef;
    --mint-deep: #7bbfa8;
    --peach: #f7c4a0;
    --peach-light: #fef0e6;
    --lavender: #c4b5e8;
    --lavender-light: #ede8f8;
    --text: #3d3335;
    --text-mid: #7a6568;
    --text-light: #b09a9d;
    --border: rgba(244,167,185,0.25);
    --shadow: 0 4px 24px rgba(244,167,185,0.15);
    --shadow-sm: 0 2px 12px rgba(244,167,185,0.12);
  }
  * { margin:0; padding:0; box-sizing:border-box; color-scheme: light; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Zen Maru Gothic', sans-serif;
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 24px 16px;
    background-image:
      radial-gradient(circle at 10% 10%, rgba(244,167,185,0.12) 0%, transparent 50%),
      radial-gradient(circle at 90% 90%, rgba(168,213,194,0.12) 0%, transparent 50%),
      radial-gradient(circle at 50% 50%, rgba(196,181,232,0.06) 0%, transparent 70%);
  }
  .app { width:100%; max-width:640px; }

  /* ヘッダー */
  .header { text-align:center; margin-bottom:28px; animation: floatUp 0.7s ease; }
  .header-badge {
    display:inline-flex; align-items:center; gap:6px;
    background: linear-gradient(135deg, var(--pink-light), var(--lavender-light));
    border: 1.5px solid rgba(244,167,185,0.4);
    color: var(--pink-deep); font-size:11px; font-weight:700; letter-spacing:2px;
    padding:6px 18px; border-radius:20px; margin-bottom:14px; text-transform:uppercase;
  }
  .header h1 {
    font-family: 'Shippori Mincho', serif;
    font-size:23px; font-weight:700; color: var(--text); line-height:1.6;
  }
  .header-deco {
    display:flex; align-items:center; justify-content:center; gap:8px;
    margin-top:10px;
  }
  .deco-line { width:40px; height:1.5px; background:linear-gradient(90deg, transparent, var(--pink)); }
  .deco-line.right { background:linear-gradient(90deg, var(--pink), transparent); }
  .deco-dot { width:5px; height:5px; border-radius:50%; background:var(--pink); }

  /* 進捗 */
  .progress-wrap { margin-bottom:22px; animation: floatUp 0.7s ease 0.05s both; }
  .progress-meta { display:flex; justify-content:space-between; font-size:12px; color:var(--text-light); margin-bottom:8px; }
  .progress-bar { height:6px; background:var(--pink-light); border-radius:10px; overflow:hidden; }
  .progress-fill { height:100%; background:linear-gradient(90deg, var(--pink), var(--peach)); border-radius:10px; transition:width 0.6s cubic-bezier(0.34,1.56,0.64,1); }

  /* カード */
  .card {
    background: var(--surface); border: 1.5px solid var(--border);
    border-radius:24px; padding:32px 28px;
    animation: floatUp 0.5s ease;
    box-shadow: var(--shadow);
    position:relative; overflow:hidden;
  }
  .card::before {
    content:''; position:absolute; top:0; left:0; right:0; height:3px;
    background: linear-gradient(90deg, var(--pink), var(--peach), var(--mint));
    border-radius:24px 24px 0 0;
  }

  /* 深掘りカード */
  .deepdive-card {
    background: var(--surface); border: 1.5px solid rgba(247,196,160,0.4);
    border-radius:24px; padding:32px 28px;
    animation: floatUp 0.5s ease;
    box-shadow: 0 4px 24px rgba(247,196,160,0.2);
    position:relative; overflow:hidden;
  }
  .deepdive-card::before {
    content:''; position:absolute; top:0; left:0; right:0; height:3px;
    background: linear-gradient(90deg, var(--peach), var(--lavender));
    border-radius:24px 24px 0 0;
  }

  /* 問題番号 */
  .q-num-simple {
    font-size:12px; color:var(--text-light); text-align:right;
    margin-bottom:10px; font-weight:700; letter-spacing:1px;
  }
  .question-text {
    font-family:'Shippori Mincho', serif; font-size:16px; line-height:1.9;
    margin-bottom:22px; padding:18px 20px;
    background: linear-gradient(135deg, var(--surface2), #fff9f7);
    border-radius:16px; border-left:3px solid var(--pink);
    color: var(--text);
  }

  /* 選択肢 */
  .choices { display:flex; flex-direction:column; gap:10px; margin-bottom:22px; }
  .choice {
    display:flex; align-items:center; gap:12px; padding:14px 18px;
    background: var(--surface); border: 1.5px solid rgba(244,167,185,0.2);
    border-radius:14px; font-size:14px; color:#5a4a4d;
    font-family:'Shippori Mincho', serif;
    transition:all 0.2s ease; line-height:1.6;
  }
  .choice.clickable { cursor:pointer; }
  .choice.clickable:hover { border-color:var(--pink); background:var(--pink-light); color:var(--text); transform:translateX(4px); box-shadow:var(--shadow-sm); }
  .choice.selected { border-color:var(--pink-deep); background:var(--pink-light); color:var(--text); box-shadow:var(--shadow-sm); }
  .choice.correct { border-color:var(--mint-deep); background:var(--mint-light); color:var(--text); }
  .choice.wrong { border-color:#e8a0aa; background:#fdf0f2; color:var(--text-light); text-decoration:line-through; }
  .choice-num {
    width:26px; height:26px; border-radius:50%; flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
    font-size:12px; font-weight:700; transition:all 0.2s ease;
    background:var(--pink-light); color:var(--pink-deep); border:1.5px solid rgba(244,167,185,0.4);
  }
  .choice.selected .choice-num { background:var(--pink-deep); color:white; border-color:var(--pink-deep); }
  .choice.correct .choice-num { background:var(--mint-deep); color:white; border-color:var(--mint-deep); }
  .choice.wrong .choice-num { background:#f0c4c8; color:#c47a80; border-color:#e8a0aa; }

  /* 解説ボックス */
  .simple-explanation { background:var(--surface2); border-radius:16px; padding:22px; margin-bottom:22px; border:1px solid rgba(244,167,185,0.15); }
  .explanation-title {
    font-size:11px; font-weight:700; color:#c47a40; letter-spacing:2px; text-transform:uppercase;
    margin-bottom:12px; display:flex; align-items:center; gap:8px;
  }
  .explanation-title::before { content:''; width:3px; height:14px; background:var(--peach); border-radius:2px; display:inline-block; }
  .explanation-text { font-size:14px; line-height:1.9; color:var(--text); }
  .explanation-text strong { color:#c47a40; }

  /* 関連アコーディオン */
  .related-block { margin-bottom:22px; }
  .related-toggle {
    display:flex; align-items:center; gap:8px; width:100%; padding:12px 16px;
    background: linear-gradient(135deg, var(--lavender-light), #f8f5fd);
    border: 1.5px solid rgba(196,181,232,0.35);
    border-radius:12px; cursor:pointer; transition:all 0.2s ease;
    font-family:'Zen Maru Gothic',sans-serif; font-size:13px; color:#7a6ab8; font-weight:700;
  }
  .related-toggle:hover { border-color:var(--lavender); background:var(--lavender-light); }
  .related-toggle .toggle-icon { transition:transform 0.3s ease; font-size:11px; }
  .related-toggle.open .toggle-icon { transform:rotate(90deg); }
  .related-content {
    max-height:0; overflow:hidden; transition:max-height 0.4s ease;
    border-left:2px solid rgba(196,181,232,0.3); margin-left:12px; margin-top:0;
  }
  .related-content.open { margin-top:10px; }
  .related-content-inner {
    padding:14px 16px; font-size:13px; line-height:1.8; color:var(--text-mid);
  }
  .related-content-inner strong { color:#c47a40; }
  .related-q-label {
    font-size:10px; font-weight:700; letter-spacing:1px; color:var(--lavender);
    margin-bottom:6px; text-transform:uppercase;
  }

  /* 分岐ボタン */
  .branch-buttons { display:flex; flex-direction:column; gap:10px; }
  .btn-branch-ok {
    width:100%; padding:14px; border-radius:14px;
    font-size:14px; font-weight:700; font-family:'Zen Maru Gothic',sans-serif; cursor:pointer; transition:all 0.2s ease;
    background:linear-gradient(135deg, var(--pink), var(--pink-deep)); color:white; border:none;
    box-shadow:0 4px 16px rgba(244,167,185,0.4);
  }
  .btn-branch-ok:hover { transform:translateY(-2px); box-shadow:0 8px 24px rgba(244,167,185,0.5); }
  .deepdive-link {
    display:block; text-align:center; margin-top:12px;
    font-size:12px; color:var(--text-light);
    text-decoration:none; cursor:pointer;
    transition: color 0.2s ease;
    background:none; border:none; width:100%;
    font-family:'Zen Maru Gothic',sans-serif;
    padding:6px;
  }
  .deepdive-link:hover { color:var(--pink-deep); }

  /* ストーリーブロック */
  .story-block {
    background:linear-gradient(135deg, var(--lavender-light), var(--peach-light));
    border:1.5px solid rgba(196,181,232,0.3); border-radius:16px; padding:22px; margin-bottom:18px; position:relative;
  }
  .story-block::before { content:'📖'; font-size:18px; position:absolute; top:-10px; left:18px; background:var(--surface); padding:0 6px; }
  .story-lead { font-family:'Shippori Mincho',serif; font-size:16px; font-weight:700; color:#7a6ab8; line-height:1.6; margin-bottom:14px; }
  .story-text { font-size:14px; line-height:2; color:var(--text); }
  .story-text strong { color:#c47a40; }
  .story-text em { color:var(--mint-deep); font-style:normal; font-weight:700; }

  /* 学習アドバイスボックス */
  .advice-box { border-radius:16px; padding:20px; margin-bottom:20px; border:1.5px solid; }
  .advice-box.memory-type { background:var(--lavender-light); border-color:rgba(196,181,232,0.5); }
  .advice-box.understand-type { background:var(--mint-light); border-color:rgba(168,213,194,0.5); }
  .advice-header { display:flex; align-items:center; gap:8px; margin-bottom:12px; }
  .advice-badge { font-size:10px; font-weight:700; letter-spacing:1px; padding:3px 10px; border-radius:20px; text-transform:uppercase; }
  .memory-type .advice-badge { background:rgba(196,181,232,0.4); color:#7a6ab8; }
  .understand-type .advice-badge { background:rgba(168,213,194,0.4); color:var(--mint-deep); }
  .advice-header-text { font-size:13px; font-weight:700; color:var(--text); }
  .keyword-list { display:flex; flex-wrap:wrap; gap:8px; margin-top:4px; }
  .keyword-item {
    display:flex; align-items:center; gap:8px;
    background:rgba(196,181,232,0.2); border:1px solid rgba(196,181,232,0.4);
    border-radius:10px; padding:7px 12px;
  }
  .keyword-num { font-size:11px; color:#7a6ab8; font-weight:700; }
  .keyword-text { font-size:13px; font-weight:700; color:var(--text); }
  .keyword-note { font-size:11px; color:var(--text-light); margin-top:2px; }
  .advice-text { font-size:13px; line-height:1.9; color:var(--text); }
  .advice-text strong { color:var(--mint-deep); }

  /* 3枚カード */
  .card-grid { display:flex; flex-direction:column; gap:10px; margin-bottom:18px; }
  .mini-card {
    border-radius:14px; padding:16px 18px;
    border:1.5px solid rgba(196,181,232,0.3);
    background:linear-gradient(135deg, var(--lavender-light), #fff);
  }
  .mini-card-title { font-size:13px; font-weight:700; color:#7a6ab8; margin-bottom:6px; }
  .mini-card-desc { font-size:13px; color:var(--text); line-height:1.7; }
  .mini-card-example { font-size:12px; color:var(--text-light); margin-top:4px; }

  /* 結果 */
  .result-box { text-align:center; padding:14px 0; margin-bottom:18px; }
  .result-icon { font-size:44px; margin-bottom:8px; display:block; animation:popIn 0.5s cubic-bezier(0.34,1.56,0.64,1); }
  .result-title { font-family:'Shippori Mincho',serif; font-size:22px; font-weight:700; margin-bottom:6px; }
  .result-title.correct { color:var(--mint-deep); }
  .result-title.wrong { color:var(--pink-deep); }

  /* 完了画面 */
  .complete-box { text-align:center; padding:16px 0; }
  .complete-icon { font-size:56px; margin-bottom:14px; display:block; animation:popIn 0.6s cubic-bezier(0.34,1.56,0.64,1); }
  .complete-title { font-family:'Shippori Mincho',serif; font-size:24px; font-weight:700; color:var(--pink-deep); margin-bottom:18px; }
  .score-detail { display:flex; justify-content:center; gap:24px; margin-bottom:20px; }
  .score-item { text-align:center; }
  .score-item-num { font-size:32px; font-weight:700; }
  .score-item-label { font-size:11px; color:var(--text-light); margin-top:3px; }
  .complete-message { font-size:13px; color:var(--text-mid); line-height:1.9; margin-bottom:24px; white-space:pre-line; }

  /* ボタン */
  .btn { width:100%; padding:15px; border:none; border-radius:14px; font-size:14px; font-weight:700; font-family:'Zen Maru Gothic',sans-serif; cursor:pointer; transition:all 0.2s ease; letter-spacing:0.3px; }
  .btn-primary { background:linear-gradient(135deg, var(--pink), var(--pink-deep)); color:white; box-shadow:0 4px 16px rgba(244,167,185,0.4); }
  .btn-primary:hover { transform:translateY(-2px); box-shadow:0 8px 24px rgba(244,167,185,0.5); }
  .btn-secondary { background:var(--surface); color:var(--text-mid); border:1.5px solid rgba(244,167,185,0.3); }
  .btn-secondary:hover { border-color:var(--pink); color:var(--pink-deep); }
  .btn-success { background:linear-gradient(135deg, var(--mint), var(--mint-deep)); color:white; box-shadow:0 4px 16px rgba(168,213,194,0.4); }
  .btn-success:hover { transform:translateY(-2px); }
  .btn-gold { background:linear-gradient(135deg, var(--peach), #e8904a); color:white; box-shadow:0 4px 16px rgba(247,196,160,0.4); }
  .btn-gold:hover { transform:translateY(-2px); }
  .btn-back {
    display:inline-block; margin-top:14px; padding:6px 10px; border-radius:8px;
    font-size:11px; font-weight:500; font-family:'Zen Maru Gothic',sans-serif;
    cursor:pointer; transition:all 0.2s ease;
    background:transparent; border:none; color:var(--text-light);
    text-align:left;
  }
  .btn-back:hover { color:var(--text-mid); }

  .hint { text-align:center; font-size:12px; color:var(--text-light); margin-bottom:14px; line-height:1.6; }
  .hidden { display:none; }

  @keyframes floatUp { from{opacity:0;transform:translateY(18px)} to{opacity:1;transform:translateY(0)} }
  @keyframes popIn { from{transform:scale(0);opacity:0} to{transform:scale(1);opacity:1} }

  @media (min-width: 768px) {
    .app { max-width: 720px; }
    .header h1 { font-size: 27px; }
    .question-text { font-size: 18px; line-height: 2; padding: 22px 24px; }
    .choice { font-size: 16px; padding: 16px 20px; }
    .choice-num { width: 30px; height: 30px; font-size: 13px; }
    .btn { font-size: 16px; padding: 17px; }
    .btn-branch-ok { font-size: 16px; padding: 16px; }
    .explanation-text { font-size: 16px; }
    .story-text { font-size: 15px; }
    .story-lead { font-size: 18px; }
    .advice-text { font-size: 15px; }
    .keyword-text { font-size: 15px; }
    .keyword-note { font-size: 13px; }
    .result-title { font-size: 26px; }
    .complete-title { font-size: 28px; }
    .hint { font-size: 14px; }
    .related-toggle { font-size: 14px; }
    .related-content-inner { font-size: 14px; }
  }
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <div class="header-badge">🌸 生成AIパスポート対策</div>
    <h1>第1章　AI（人工知能）</h1>
    <div class="header-deco">
      <div class="deco-line"></div>
      <div class="deco-dot"></div>
      <div class="deco-line right"></div>
    </div>
  </div>

  <div class="progress-wrap">
    <div class="progress-meta">
      <span id="progressLabel">15問中1問目</span>
      <span id="progressPct">0%</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  </div>

  <!-- STEP1: 選択肢を見る -->
  <div class="card" id="step1">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
      <div class="q-num-simple" id="s1-qnum" style="margin-bottom:0;"></div>
      <div style="font-size:12px; color:var(--text-light);">まず選択肢に目を通してみよう</div>
    </div>
    <div class="question-text" id="s1-qtext"></div>
    <div class="choices" id="s1-choices"></div>
    <p class="hint">💡 答えは選ばなくてOK</p>
    <button class="btn btn-primary" onclick="showStep2()">解説を読む →</button>
  </div>

  <!-- STEP2: かんたん解説 -->
  <div class="card hidden" id="step2">
    <div class="question-text" id="s2-qtext"></div>
    <div class="simple-explanation">
      <div class="explanation-title">かんたん解説</div>
      <div class="explanation-text" id="s2-simple"></div>
    </div>
    <div id="s2-related"></div>
    <div class="branch-buttons">
      <button class="btn-branch-ok" onclick="showStep3()">理解できたので問題を解く →</button>
      <button class="deepdive-link" onclick="showDeepDive()">🔍 もっと詳しく読む</button>
    </div>
    <button class="btn-back" onclick="showScreen('step1')">← 問題に戻る</button>
  </div>

  <!-- 深掘り解説 -->
  <div class="deepdive-card hidden" id="stepDeepDive">
    <div id="deepdive-content"></div>
    <button class="btn btn-primary" onclick="showStep3()">問題を解く →</button>
    <button class="btn-back" onclick="showScreen('step2')">← かんたん解説に戻る</button>
  </div>

  <!-- STEP3: 問題を解く -->
  <div class="card hidden" id="step3">
    <div class="q-num-simple" id="s3-qnum"></div>
    <div class="question-text" id="s3-qtext"></div>
    <div class="choices" id="s3-choices"></div>
    <button class="btn btn-secondary hidden" id="answerBtn" onclick="showResult()">答え合わせをする →</button>
    <button class="btn-back" onclick="showStep2()">← 解説をもう一度確認する</button>
  </div>

  <!-- STEP4: 答え合わせ -->
  <div class="card hidden" id="step4">
    <div class="result-box" id="resultBox"></div>
    <div class="choices" id="s4-choices"></div>
    <div class="simple-explanation">
      <div class="explanation-title">ポイント</div>
      <div class="explanation-text" id="s4-summary"></div>
    </div>
    <button class="btn btn-success" id="nextBtn" onclick="nextQuestion()">次の問題へ進む →</button>
  </div>

  <!-- 完了画面 -->
  <div class="card hidden" id="stepComplete">
    <div class="complete-box">
      <span class="complete-icon">🌸</span>
      <div class="complete-title">第1章 完了！</div>
      <div class="score-detail">
        <div class="score-item"><div class="score-item-num" id="correctCount" style="color:var(--mint-deep)">0</div><div class="score-item-label">正解</div></div>
        <div class="score-item"><div class="score-item-num" style="color:var(--text-light)">／</div><div class="score-item-label">　</div></div>
        <div class="score-item"><div class="score-item-num" style="color:var(--text)">15</div><div class="score-item-label">問</div></div>
        <div class="score-item"><div class="score-item-num" id="wrongCount" style="color:var(--pink-deep)">0</div><div class="score-item-label">不正解</div></div>
      </div>
      <div class="complete-message" id="completeMessage"></div>
      <button class="btn btn-gold" onclick="restartQuiz()">もう一度チャレンジする 🌸</button>
    </div>
  </div>

</div>
<script>
const questions = [
  // Q1: ダートマス会議
  {
    chapter: '第1章 AIの定義',
    question: '「AI（人工知能）」という用語が初めて公式に使われたとされる出来事として、最も適切なものを選べ。',
    choices: [
      'アラン・チューリングが「チューリングテスト」を提唱した論文の発表',
      'ジョン・マッカーシーらが主催した1956年のダートマス会議',
      'IBMのコンピュータ「Deep Blue」がチェス世界チャンピオンに勝利した出来事',
      'ジェフリー・ヒントンらによるディープラーニングの研究発表'
    ],
    correct: 1,
    simple: `「AI（人工知能）」という言葉は、<strong>1956年にアメリカで開かれた「ダートマス会議」</strong>で初めて使われました。提唱したのは<strong>ジョン・マッカーシー</strong>という研究者で、この会議がAI研究という分野の出発点とされています。`,

let currentQ = 0, selectedIdx = null, correctCount = 0, wrongCount = 0;

const allScreens = ['step1','step2','stepDeepDive','step3','step4','stepComplete'];

function showScreen(id) {
  allScreens.forEach(s => document.getElementById(s).classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
  window.scrollTo({top:0, behavior:'smooth'});
}

function updateProgress() {
  const total = questions.length;
  const pct = Math.round((currentQ / total) * 100);
  document.getElementById('progressLabel').textContent = `${total}問中${currentQ+1}問目`;
  document.getElementById('progressPct').textContent = `${pct}%`;
  document.getElementById('progressFill').style.width = `${pct}%`;
}

function renderChoices(cid, choices, clickable) {
  const c = document.getElementById(cid); c.innerHTML = '';
  choices.forEach((text, i) => {
    const d = document.createElement('div');
    d.className = 'choice' + (clickable ? ' clickable' : '');
    if (clickable) d.onclick = () => selectChoice(i);
    d.innerHTML = `<div class="choice-num">${i+1}</div><span>${text}</span>`;
    c.appendChild(d);
  });
}

    const toggle = document.createElement('button');
    toggle.className = 'related-toggle';
    toggle.innerHTML = `<span class="toggle-icon">▶</span> 🔗 関連：${rel.keyword}（問題${rel.qIndex+1}）`;

    const content = document.createElement('div');
    content.className = 'related-content';
    content.innerHTML = `<div class="related-content-inner"><div class="related-q-label">問題${rel.qIndex+1}のかんたん解説</div>${q.simple}</div>`;

    toggle.onclick = () => {
      toggle.classList.toggle('open');
      if (content.classList.contains('open')) {
        content.style.maxHeight = '0';
        content.classList.remove('open');
      } else {
        content.classList.add('open');
        content.style.maxHeight = content.scrollHeight + 'px';
      }
    };

    block.appendChild(toggle);
    block.appendChild(content);
    container.appendChild(block);
  });
}

function loadQuestion(idx) {
  const q = questions[idx];
  const qnum = `問題 ${idx+1}`;

  document.getElementById('s1-qnum').textContent = qnum;
  document.getElementById('s1-qtext').textContent = q.question;
  renderChoices('s1-choices', q.choices, false);

  document.getElementById('s2-qtext').textContent = q.question;
  document.getElementById('s2-simple').innerHTML = q.simple;
  renderRelated('s2-related', q.related);

  document.getElementById('deepdive-content').innerHTML = q.deepdive;

  document.getElementById('s3-qnum').textContent = qnum;
  document.getElementById('s3-qtext').textContent = q.question;
  renderChoices('s3-choices', q.choices, true);
  selectedIdx = null;
  document.getElementById('answerBtn').classList.add('hidden');
}

function showStep2() { showScreen('step2'); }
function showDeepDive() { showScreen('stepDeepDive'); }
function showStep3() {
  showScreen('step3');
  selectedIdx = null;
  document.querySelectorAll('#s3-choices .choice').forEach(c => c.className = 'choice clickable');
  document.getElementById('answerBtn').classList.add('hidden');
}

function selectChoice(idx) {
  selectedIdx = idx;
  document.querySelectorAll('#s3-choices .choice').forEach(c => c.className = 'choice clickable');
  document.querySelectorAll('#s3-choices .choice')[idx].classList.add('selected');
  document.getElementById('answerBtn').classList.remove('hidden');
}

function showResult() {
  const q = questions[currentQ], isCorrect = selectedIdx === q.correct;
  if (isCorrect) correctCount++; else wrongCount++;

  document.getElementById('resultBox').innerHTML = isCorrect
    ? `<span class="result-icon">🌸</span><div class="result-title correct">正解！</div>`
    : `<span class="result-icon">💭</span><div class="result-title wrong">惜しい！</div>`;

  const s4 = document.getElementById('s4-choices'); s4.innerHTML = '';
  q.choices.forEach((text, i) => {
    const d = document.createElement('div');
    if (i === q.correct) { d.className = 'choice correct'; d.innerHTML = `<div class="choice-num">${i+1}</div><span>${text} ✓</span>`; }
    else if (i === selectedIdx && !isCorrect) { d.className = 'choice wrong'; d.innerHTML = `<div class="choice-num">${i+1}</div><span>${text} ✗</span>`; }
    else { d.className = 'choice'; d.innerHTML = `<div class="choice-num">${i+1}</div><span>${text}</span>`; }
    s4.appendChild(d);
  });

  document.getElementById('s4-summary').innerHTML = q.summary;

  const nb = document.getElementById('nextBtn');
  if (currentQ === questions.length - 1) { nb.textContent = '結果を見る 🌸'; nb.className = 'btn btn-gold'; }
  else { nb.textContent = '次の問題へ進む →'; nb.className = 'btn btn-success'; }

  showScreen('step4');
}

function nextQuestion() {
  if (currentQ === questions.length - 1) { showComplete(); return; }
  currentQ++;
  loadQuestion(currentQ);
  updateProgress();
  showScreen('step1');
}

function showComplete() {
  document.getElementById('correctCount').textContent = correctCount;
  document.getElementById('wrongCount').textContent = wrongCount;
  document.getElementById('progressFill').style.width = '100%';
  document.getElementById('progressPct').textContent = '100%';
  document.getElementById('progressLabel').textContent = `15問中15問目`;

  const pct = correctCount / questions.length;
  let msg = pct === 1 ? '全問正解！素晴らしいです🌸\n第1章の内容はバッチリです。第2章へ進みましょう！'
    : pct >= 0.8 ? 'とてもよくできました！\n間違えた問題だけもう一度確認してみましょう。'
    : pct >= 0.6 ? 'まずまずです！\n間違えた問題の解説を読み直してから、もう一度チャレンジを。'
    : 'もう一度チャレンジしてみましょう！\n深掘り解説をじっくり読んでから再挑戦すると定着します。';
  document.getElementById('completeMessage').textContent = msg;
  showScreen('stepComplete');
}

function restartQuiz() {
  currentQ = 0; selectedIdx = null; correctCount = 0; wrongCount = 0;
  loadQuestion(0);
  updateProgress();
  showScreen('step1');
}

// 初期化
loadQuestion(0);
updateProgress();
showScreen('step1');
</script>
</body>
</html>
