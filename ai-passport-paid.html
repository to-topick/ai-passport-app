<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="light only">
<title>生成AIパスポート 学習アプリ〔全5章〕</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&family=Shippori+Mincho:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #fdf8f5;
    --surface: #ffffff;
    --surface2: #fef3f0;
    --surface3: #f0f7f4;
    --pink: #f4a7b9;
    --pink-light: #fde8ee;
    --pink-deep: #e8849a;
    --navy: #1e3a5f;
    --navy-mid: #2a4f7c;
    --navy-light: #e8edf3;
    --mint: #a8d5c2;
    --mint-light: #e6f5ef;
    --mint-deep: #7bbfa8;
    --peach: #f7c4a0;
    --peach-light: #fef0e6;
    --lavender: #c4b5e8;
    --lavender-light: #ede8f8;
    --text: #3d3335;
    --text-mid: #7a6568;
    --text-light: #b09a9d;
    --border: rgba(244,167,185,0.25);
    --shadow: 0 4px 24px rgba(244,167,185,0.15);
    --shadow-sm: 0 2px 12px rgba(244,167,185,0.12);
  }
  * { margin:0; padding:0; box-sizing:border-box; color-scheme: light; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Zen Maru Gothic', sans-serif;
    min-height: 100vh;
    display: flex; align-items: flex-start; justify-content: center;
    padding: 24px 16px;
    background-image:
      radial-gradient(circle at 10% 10%, rgba(244,167,185,0.12) 0%, transparent 50%),
      radial-gradient(circle at 90% 90%, rgba(244,167,185,0.07) 0%, transparent 50%);
  }
  .app { width:100%; max-width:640px; }

  /* ============================
     Chapter Selection Screen
  ============================ */
  .chapter-select-header {
    text-align:center; margin-bottom:24px; animation: floatUp 0.6s ease;
  }
  .header-badge {
    display:inline-flex; align-items:center; gap:6px;
    background: linear-gradient(135deg, var(--pink-light), var(--navy-light));
    border: 1.5px solid rgba(244,167,185,0.4);
    color: var(--pink-deep); font-size:11px; font-weight:700; letter-spacing:2px;
    padding:6px 18px; border-radius:20px; margin-bottom:12px; text-transform:uppercase;
  }
  .chapter-select-header h1 {
    font-family: 'Shippori Mincho', serif;
    font-size:22px; font-weight:700; color: var(--text); line-height:1.6;
    margin-bottom:4px;
  }
  .chapter-select-header p {
    font-size:13px; color:var(--text-light); margin-bottom:16px;
  }
  .overall-progress-wrap {
    background: var(--surface); border: 1.5px solid var(--border);
    border-radius:16px; padding:16px 20px; margin-bottom:20px;
    box-shadow: var(--shadow-sm); animation: floatUp 0.6s ease 0.05s both;
  }
  .overall-progress-label {
    display:flex; justify-content:space-between; font-size:12px;
    color:var(--text-light); margin-bottom:8px;
  }
  .overall-progress-label span:first-child { font-weight:700; color:var(--text-mid); }
  .progress-bar { height:8px; background:var(--pink-light); border-radius:10px; overflow:hidden; }
  .progress-fill { height:100%; background:linear-gradient(90deg, var(--pink), var(--peach)); border-radius:10px; transition:width 0.6s cubic-bezier(0.34,1.56,0.64,1); }

  /* Chapter Cards */
  .chapter-cards { display:flex; flex-direction:column; gap:14px; margin-bottom:18px; }
  .chapter-card {
    background: var(--surface); border: 1.5px solid var(--border);
    border-radius:20px; padding:18px 20px;
    box-shadow: var(--shadow-sm);
    cursor:pointer; transition:all 0.22s ease;
    display:flex; align-items:center; gap:16px;
    animation: floatUp 0.5s ease both;
    position:relative; overflow:hidden;
  }
  .chapter-card::before {
    content:''; position:absolute; left:0; top:0; bottom:0; width:4px;
    border-radius:20px 0 0 20px;
  }
  .chapter-card:hover { transform:translateY(-3px) translateX(2px); box-shadow: 0 8px 28px rgba(244,167,185,0.22); }
  .chapter-card-emoji { font-size:32px; flex-shrink:0; }
  .chapter-card-body { flex:1; min-width:0; }
  .chapter-card-subtitle { font-size:10px; font-weight:700; letter-spacing:2px; text-transform:uppercase; margin-bottom:3px; }
  .chapter-card-title { font-family:'Shippori Mincho',serif; font-size:15px; font-weight:700; color:var(--text); line-height:1.5; margin-bottom:8px; }
  .chapter-card-progress-row { display:flex; align-items:center; gap:8px; }
  .chapter-card-progress-bar { flex:1; height:5px; background:rgba(0,0,0,0.07); border-radius:10px; overflow:hidden; }
  .chapter-card-progress-fill { height:100%; border-radius:10px; transition:width 0.5s ease; }
  .chapter-card-progress-text { font-size:11px; color:var(--text-light); white-space:nowrap; }
  .chapter-card-badges { display:flex; gap:6px; margin-top:8px; flex-wrap:wrap; }
  .badge {
    font-size:10px; font-weight:700; padding:3px 9px; border-radius:20px; letter-spacing:0.5px;
  }
  .badge-complete { background:var(--mint-light); color:var(--mint-deep); border:1px solid rgba(168,213,194,0.5); }
  .badge-perfect { background:var(--lavender-light); color:#7a6ab8; border:1px solid rgba(196,181,232,0.4); }
  .chapter-card-arrow { font-size:18px; color:var(--text-light); flex-shrink:0; }

  /* Shuffle Button */
  .btn-shuffle {
    width:100%; padding:16px; border-radius:16px; border:none;
    background: linear-gradient(135deg, var(--navy), var(--navy-mid));
    color:white; font-size:15px; font-weight:700;
    font-family:'Zen Maru Gothic',sans-serif; cursor:pointer;
    transition:all 0.22s ease; box-shadow:0 4px 18px rgba(30,58,95,0.3);
    display:flex; align-items:center; justify-content:center; gap:10px;
    margin-bottom:12px; animation: floatUp 0.5s ease 0.35s both;
  }
  .btn-shuffle:hover { transform:translateY(-2px); box-shadow:0 8px 28px rgba(30,58,95,0.42); }

  /* ============================
     Quiz Screen
  ============================ */
  .quiz-header { margin-bottom:20px; animation: floatUp 0.5s ease; }
  .quiz-breadcrumb {
    display:flex; align-items:center; gap:8px; margin-bottom:14px;
  }
  .btn-back-to-chapters {
    display:inline-flex; align-items:center; gap:5px;
    background:none; border:none; font-size:13px; color:var(--text-mid);
    cursor:pointer; font-family:'Zen Maru Gothic',sans-serif; padding:4px 0;
    transition:color 0.2s ease;
  }
  .btn-back-to-chapters:hover { color:var(--pink-deep); }
  .quiz-chapter-badge {
    display:inline-flex; align-items:center; gap:6px; font-size:11px; font-weight:700;
    padding:4px 12px; border-radius:20px; letter-spacing:1px;
    border:1.5px solid rgba(244,167,185,0.3); color:var(--text-mid); background:var(--surface);
  }

  /* ステップインジケーター */
  .steps { display:none; align-items:center; justify-content:center; margin-bottom:24px; animation: floatUp 0.7s ease 0.1s both; }
  .step { display:flex; flex-direction:column; align-items:center; gap:5px; }
  .step-num {
    width:34px; height:34px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-size:13px; font-weight:700;
    border: 2px solid rgba(244,167,185,0.3);
    background: var(--surface); color: var(--text-light);
    transition: all 0.4s ease;
  }
  .step-label { font-size:10px; color:var(--text-light); white-space:nowrap; transition:color 0.4s ease; }
  .step.active .step-num { background:linear-gradient(135deg, var(--pink), var(--pink-deep)); border-color:var(--pink); color:white; box-shadow:0 4px 14px rgba(244,167,185,0.5); }
  .step.active .step-label { color:var(--pink-deep); font-weight:700; }
  .step.done .step-num { background:var(--pink-light); border-color:var(--pink); color:var(--pink-deep); }
  .step.done .step-label { color:var(--pink-deep); }
  .step-line { width:36px; height:2px; background:var(--pink-light); margin-bottom:19px; transition:background 0.4s ease; border-radius:2px; }
  .step-line.done { background:linear-gradient(90deg, var(--pink-light), var(--pink)); }

  /* カード */
  .card {
    background: var(--surface); border: 1.5px solid var(--border);
    border-radius:24px; padding:32px 28px;
    animation: floatUp 0.5s ease;
    box-shadow: var(--shadow);
    position:relative; overflow:hidden;
  }
  .card::before {
    content:''; position:absolute; top:0; left:0; right:0; height:3px;
    background: linear-gradient(90deg, var(--pink), var(--navy));
    border-radius:24px 24px 0 0;
  }
  .deepdive-card {
    background: var(--surface); border: 1.5px solid rgba(30,58,95,0.15);
    border-radius:24px; padding:32px 28px;
    animation: floatUp 0.5s ease;
    box-shadow: 0 4px 24px rgba(30,58,95,0.1);
    position:relative; overflow:hidden;
  }
  .deepdive-card::before {
    content:''; position:absolute; top:0; left:0; right:0; height:3px;
    background: linear-gradient(90deg, var(--pink-deep), var(--navy));
    border-radius:24px 24px 0 0;
  }

  /* タグ */
  .step-tag {
    display:none;
    padding:5px 14px; border-radius:20px; margin-bottom:18px; text-transform:uppercase;
    background:var(--pink-light); border:1.5px solid rgba(244,167,185,0.4); color:var(--pink-deep);
  }
  .step-tag.s2 { background:var(--peach-light); border-color:rgba(247,196,160,0.5); color:#c47a40; }
  .step-tag.s3 { background:var(--navy-light); border-color:rgba(30,58,95,0.2); color:var(--navy); }
  .step-tag.s4 { background:var(--pink-light); border-color:rgba(244,167,185,0.4); color:var(--pink-deep); }
  .deepdive-tag {
    display:inline-flex; align-items:center; gap:6px; font-size:11px; font-weight:700; letter-spacing:1.5px;
    padding:5px 14px; border-radius:20px; margin-bottom:18px; text-transform:uppercase;
    background:var(--peach-light); border:1.5px solid rgba(247,196,160,0.5); color:#c47a40;
  }

  /* 問題 */
  .q-num-simple { display:none; }
  .question-text {
    font-family:'Shippori Mincho', serif; font-size:16px; line-height:1.9;
    margin-bottom:22px; padding:18px 20px;
    background: linear-gradient(135deg, var(--surface2), #fff9f7);
    border-radius:16px; border-left:3px solid var(--pink);
    color: var(--text);
  }

  /* 選択肢 */
  .choices { display:flex; flex-direction:column; gap:10px; margin-bottom:22px; }
  .choice {
    display:flex; align-items:center; gap:12px; padding:14px 18px;
    background: var(--surface); border: 1.5px solid rgba(244,167,185,0.2);
    border-radius:14px; font-size:14px; color:#5a4a4d;
    font-family:'Shippori Mincho', serif;
    transition:all 0.2s ease; line-height:1.6;
  }
  .choice.clickable { cursor:pointer; }
  .choice.clickable:hover { border-color:var(--pink); background:var(--pink-light); color:var(--text); transform:translateX(4px); box-shadow:var(--shadow-sm); }
  .choice.selected { border-color:var(--pink-deep); background:var(--pink-light); color:var(--text); box-shadow:var(--shadow-sm); }
  .choice.correct { border-color:var(--pink-deep); background:var(--pink-light); color:var(--text); }
  .choice.wrong { border-color:#e8a0aa; background:#fdf0f2; color:var(--text-light); text-decoration:line-through; }
  .choice-num {
    width:26px; height:26px; border-radius:50%; flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
    font-size:12px; font-weight:700; transition:all 0.2s ease;
    background:var(--pink-light); color:var(--pink-deep); border:1.5px solid rgba(244,167,185,0.4);
  }
  .choice.selected .choice-num { background:var(--pink-deep); color:white; border-color:var(--pink-deep); }
  .choice.correct .choice-num { background:var(--pink-deep); color:white; border-color:var(--pink-deep); }
  .choice.wrong .choice-num { background:#f0c4c8; color:#c47a80; border-color:#e8a0aa; }

  /* 解説 */
  .simple-explanation { background:var(--surface2); border-radius:16px; padding:22px; margin-bottom:22px; border:1px solid rgba(244,167,185,0.15); }
  .explanation-title {
    font-size:11px; font-weight:700; color:#c47a40; letter-spacing:2px; text-transform:uppercase;
    margin-bottom:12px; display:flex; align-items:center; gap:8px;
  }
  .explanation-title::before { content:''; width:3px; height:14px; background:var(--peach); border-radius:2px; display:inline-block; }
  .explanation-text { font-size:14px; line-height:1.9; color:var(--text); }
  .explanation-text strong { color:#c47a40; }

  /* ブランチボタン */
  .branch-buttons { display:flex; flex-direction:column; gap:10px; }
  .btn-branch-more {
    width:100%; padding:14px; border-radius:14px;
    font-size:14px; font-weight:700; font-family:'Zen Maru Gothic',sans-serif; cursor:pointer; transition:all 0.2s ease;
    background:var(--peach-light); border:1.5px solid rgba(247,196,160,0.6); color:#c47a40;
  }
  .btn-branch-more:hover { background:var(--peach); color:white; border-color:var(--peach); transform:translateY(-2px); box-shadow:0 6px 20px rgba(247,196,160,0.4); }
  .btn-branch-ok {
    width:100%; padding:14px; border-radius:14px;
    font-size:14px; font-weight:700; font-family:'Zen Maru Gothic',sans-serif; cursor:pointer; transition:all 0.2s ease;
    background: var(--navy); color:white; border:none;
    box-shadow:0 4px 16px rgba(30,58,95,0.3);
  }
  .btn-branch-ok:hover { transform:translateY(-2px); box-shadow:0 8px 24px rgba(30,58,95,0.45); background: var(--navy-mid); }

  .deepdive-link {
    display:block; text-align:center; margin-top:12px;
    font-size:12px; color:var(--text-light);
    text-decoration:none; cursor:pointer;
    transition: color 0.2s ease;
    background:none; border:none; width:100%;
    font-family:'Zen Maru Gothic',sans-serif;
    padding:6px;
  }
  .deepdive-link:hover { color:var(--pink-deep); }

  /* ストーリーブロック */
  .story-block {
    background:linear-gradient(135deg, var(--pink-light), var(--navy-light));
    border:1.5px solid rgba(196,181,232,0.3); border-radius:16px; padding:22px; margin-bottom:18px; position:relative;
  }
  .story-lead { font-family:'Shippori Mincho',serif; font-size:16px; font-weight:700; color:var(--navy); line-height:1.6; margin-bottom:14px; }
  .story-text { font-size:14px; line-height:2; color:var(--text); }
  .story-text strong { background: linear-gradient(transparent 55%, rgba(212,83,126,0.25) 55%); color: inherit; font-weight: 700; }
  .story-text em { color:var(--navy); font-style:normal; font-weight:700; }
  .quote-block {
    border-left:3px solid var(--navy); padding:12px 18px;
    background:rgba(30,58,95,0.06); border-radius:0 10px 10px 0;
    margin:14px 0; font-family:'Shippori Mincho',serif;
    font-size:15px; color:var(--navy); line-height:1.8;
  }

  /* 学習アドバイスボックス */
  .advice-box { border-radius:16px; padding:20px; margin-bottom:20px; border:1.5px solid; }
  .advice-box.memory-type { background:var(--navy-light); border-color:rgba(30,58,95,0.2); }
  .advice-box.understand-type { background:var(--pink-light); border-color:rgba(244,167,185,0.3); }
  .advice-header { display:flex; align-items:center; gap:8px; margin-bottom:12px; }
  .advice-badge { font-size:10px; font-weight:700; letter-spacing:1px; padding:3px 10px; border-radius:20px; text-transform:uppercase; }
  .memory-type .advice-badge { background:rgba(30,58,95,0.15); color:var(--navy); }
  .understand-type .advice-badge { background:rgba(244,167,185,0.3); color:var(--pink-deep); }
  .advice-header-text { font-size:13px; font-weight:700; color:var(--text); }
  .keyword-list { display:flex; flex-wrap:wrap; gap:8px; margin-top:4px; }
  .keyword-item {
    display:flex; align-items:center; gap:8px;
    background:rgba(196,181,232,0.2); border:1px solid rgba(196,181,232,0.4);
    border-radius:10px; padding:7px 12px;
  }
  .keyword-num { font-size:11px; color:#7a6ab8; font-weight:700; }
  .keyword-text { font-size:13px; font-weight:700; color:var(--text); }
  .keyword-note { font-size:11px; color:var(--text-light); margin-top:2px; }
  .advice-text { font-size:13px; line-height:1.9; color:var(--text); }
  .advice-text strong { background: linear-gradient(transparent 55%, rgba(212,83,126,0.25) 55%); color: inherit; font-weight: 700; }

  /* 3枚カード */
  .card-grid { display:flex; flex-direction:column; gap:10px; margin-bottom:18px; }
  .mini-card {
    border-radius:14px; padding:16px 18px;
    border:1.5px solid rgba(196,181,232,0.3);
    background:linear-gradient(135deg, var(--navy-light), #fff);
  }
  .mini-card-title { font-size:13px; font-weight:700; color:var(--navy); margin-bottom:6px; }
  .mini-card-desc { font-size:13px; color:var(--text); line-height:1.7; }
  .mini-card-example { font-size:12px; color:var(--text-light); margin-top:4px; }

  /* 結果 */
  .result-box { text-align:center; padding:14px 0; margin-bottom:18px; }
  .result-icon { margin-bottom:8px; display:flex; justify-content:center; animation:popIn 0.5s cubic-bezier(0.34,1.56,0.64,1); }
  .result-stamp { position:relative; display:inline-flex; align-items:center; justify-content:center; }
  .result-stamp img { object-fit:contain; display:block; }
  .stamp-correct img { width:110px; height:auto; }
  .stamp-wrong img { width:110px; height:auto; }
  .result-title { font-family:'Shippori Mincho',serif; font-size:22px; font-weight:700; margin-bottom:6px; }
  .result-title.correct { color:var(--navy); }
  .result-title.wrong { color:var(--pink-deep); }
  .result-message { font-size:13px; color:var(--text-light); line-height:1.7; }

  /* 完了画面 */
  .complete-box { text-align:center; padding:16px 0; }
  .complete-icon { font-size:56px; margin-bottom:14px; display:block; animation:popIn 0.6s cubic-bezier(0.34,1.56,0.64,1); }
  .complete-title { font-family:'Shippori Mincho',serif; font-size:24px; font-weight:700; color:var(--pink-deep); margin-bottom:18px; }
  .score-detail { display:flex; justify-content:center; gap:24px; margin-bottom:20px; }
  .score-item { text-align:center; }
  .score-item-num { font-size:32px; font-weight:700; }
  .score-item-label { font-size:11px; color:var(--text-light); margin-top:3px; }
  .complete-message { font-size:13px; color:var(--text-mid); line-height:1.9; margin-bottom:24px; white-space:pre-line; }

  /* ボタン */
  .btn { width:100%; padding:15px; border:none; border-radius:14px; font-size:14px; font-weight:700; font-family:'Zen Maru Gothic',sans-serif; cursor:pointer; transition:all 0.2s ease; letter-spacing:0.3px; }
  .btn-primary { background: var(--navy); color:white; box-shadow:0 4px 16px rgba(30,58,95,0.3); }
  .btn-primary:hover { transform:translateY(-2px); box-shadow:0 8px 24px rgba(30,58,95,0.45); background: var(--navy-mid); }
  .btn-secondary { background:var(--surface); color:var(--text-mid); border:1.5px solid rgba(244,167,185,0.3); }
  .btn-secondary:hover { border-color:var(--pink); color:var(--pink-deep); }
  .btn-success { background: var(--navy); color:white; box-shadow:0 4px 16px rgba(30,58,95,0.3); }
  .btn-success:hover { transform:translateY(-2px); background: var(--navy-mid); }
  .btn-danger { background: var(--surface); color:var(--text-mid); border:1.5px solid rgba(244,167,185,0.25); margin-top:10px; }
  .btn-danger:hover { border-color:var(--pink); color:var(--pink-deep); }
  .btn-back {
    display:inline-block; margin-top:14px; padding:6px 10px; border-radius:8px;
    font-size:11px; font-weight:500; font-family:'Zen Maru Gothic',sans-serif;
    cursor:pointer; transition:all 0.2s ease;
    background:transparent; border:none; color:var(--text-light);
    text-align:left;
  }
  .btn-back:hover { color:var(--text-mid); }

  .hint { text-align:center; font-size:12px; color:var(--text-light); margin-bottom:14px; line-height:1.6; }
  .hidden { display:none; }

  /* progress inline */
  .progress-meta-quiz { display:flex; justify-content:space-between; font-size:12px; color:var(--text-light); margin-bottom:8px; }
  .progress-wrap-quiz { margin-bottom:20px; animation: floatUp 0.5s ease; }

  @keyframes floatUp { from{opacity:0;transform:translateY(18px)} to{opacity:1;transform:translateY(0)} }
  @keyframes popIn { from{transform:scale(0);opacity:0} to{transform:scale(1);opacity:1} }

  @media (min-width: 480px) {
    .chapter-cards { gap:12px; }
  }
  @media (min-width: 768px) {
    .app { max-width: 720px; }
    .chapter-select-header h1 { font-size: 26px; }
    .question-text { font-size: 18px; line-height: 2; padding: 22px 24px; }
    .choice { font-size: 16px; padding: 16px 20px; }
    .choice-num { width: 30px; height: 30px; font-size: 13px; }
    .btn { font-size: 16px; padding: 17px; }
    .btn-branch-ok { font-size: 16px; padding: 16px; }
    .btn-branch-more { font-size: 16px; padding: 16px; }
    .explanation-text { font-size: 16px; }
    .story-text { font-size: 15px; }
    .story-lead { font-size: 18px; }

<div class="app" id="app">

</div><!-- /app -->

    deepdive: `<div class="story-block"><div class="story-lead">猫を見分けるのに、何段階の「目」が必要か</div><div class="story-text">人間が猫の写真を見るとき、脳の中では何段階もの処理が行われています。<br><br>まず「線や輪郭」を認識 → 次に「耳の形」「目の位置」を把握 → さらに「全体のシルエット」を判断 → 最後に「これは猫だ」と結論を出す。<br><br><strong>ディープラーニング</strong>はこの仕組みを再現しています。<strong>ニューラルネットワーク</strong>の層（レイヤー）を何十層・何百層と重ねることで、単純な特徴 → 複雑な特徴へと段階的に学習していきます。<br><br>「ディープ（深い）」という名前は、この<strong>層の深さ</strong>から来ています。層が深いほど複雑なパターンを学べるため、画像認識や音声認識で人間を超える精度を実現しました。</div></div><div class="advice-box understand-type"><div class="advice-header"><span class="advice-badge">理解ポイント</span><span class="advice-header-text">つながりを整理</span></div><div class="advice-text"><strong>ニューロン（人間の脳の神経細胞）</strong> → それを模した<strong>人工ニューロン</strong> → それをつなげた<strong>ニューラルネットワーク</strong> → その層を深くした<strong>ディープラーニング</strong></div></div>`,

    deepdive: `<div class="card-grid"><div class="mini-card"><div class="mini-card-title">① エンコーダ（特徴を抽出する）</div><div class="mini-card-desc">何万枚もの顔写真を読み込み、「目の大きさ」「髪の長さ」「笑顔の度合い」といった特徴を数値化します。似顔絵アプリの<strong>調整スライダーを自動で作る</strong>イメージです。</div><div class="mini-card-example">役割：データ → 特徴の数値セットに圧縮</div></div><div class="mini-card"><div class="mini-card-title">② 潜在ベクトル（スライダーの数値セット）</div><div class="mini-card-desc">抽出された特徴の数値のまとまりです。VAEの特徴は、「目＝8」と固定するのではなく<strong>「7〜9の幅（ゆらぎ）」として記憶</strong>する点。この「幅」が生成の源になります。</div><div class="mini-card-example">役割：特徴を「幅を持った数値」として保持</div></div><div class="mini-card"><div class="mini-card-title">③ デコーダ（画像を復元・生成する）</div><div class="mini-card-desc">スライダーの数値を受け取って画像を描き出します。幅の中からランダムに数値を選ぶことで、<strong>元データに似ているが存在しない新しい画像</strong>を無限に生成できます。</div><div class="mini-card-example">役割：数値セット → 画像に復元・生成</div></div></div><div class="story-block" style="margin-top:16px;"><div class="story-lead">なぜ「生成モデル」と呼ばれるのか？</div><div class="story-text">単なる圧縮・復元なら「コピー機」と同じです。VAEが生成モデルと呼ばれる理由は、潜在ベクトルの<strong>「幅（ゆらぎ）」</strong>にあります。<br><br>スライダーの数値を少しズラしてデコーダに渡すと、現実には存在しない新しい顔が生まれます。学習データにはない<strong>「ありそうだけど存在しない顔」を無限に作り出せる</strong>——これが生成モデルたる所以です。</div></div><div class="advice-box understand-type" style="margin-top:12px;"><div class="advice-header"><span class="advice-badge">理解ポイント</span><span class="advice-header-text">VAEの弱点もセットで覚えよう</span></div><div class="advice-text">VAEは「幅を持たせて圧縮・復元する」構造上、出力画像が<strong>ぼやけやすい（不鮮明になりやすい）</strong>という弱点があります。また、ゆらぎがあるため<strong>同じ画像を再度生成することが難しい</strong>という特徴もあります。<br><br>この弱点を克服するために生まれたのが、次のQ4で登場する<strong>GAN</strong>です。</div></div>`,
    summary: `VAEは<strong>エンコーダ（圧縮）→ 潜在ベクトル（特徴のエッセンス）→ デコーダ（復元・生成）</strong>の構造を持つ生成モデルです。`,
    related: []
  },

    deepdive: `<div class="story-block"><div class="story-lead">偽札職人 vs 銀行の鑑定士</div><div class="story-text">GANの仕組みは、偽札職人と銀行の鑑定士の戦いに似ています。<br><br><strong>生成器（偽札職人）</strong>は、本物の紙幣にできるだけ似た偽札を作ろうとします。<br><strong>識別器（鑑定士）</strong>は、目の前のお金が本物か偽物かを見破ろうとします。<br><br>最初は偽札のクオリティが低いので、鑑定士は簡単に見破れます。でも偽札職人は失敗から学んで腕を上げる。鑑定士もさらに目を鍛える。<br><br>この<strong>いたちごっこ（＝敵対的学習）</strong>を何万回・何十万回と繰り返すうちに、偽札のクオリティは本物と見分けがつかないレベルに到達します。<br><br>重要なのは、<strong>識別器がいなくなったら生成器も成長できない</strong>ということ。2つがセットで競い合い続けることが、GANの本質です。</div></div><div class="advice-box understand-type"><div class="advice-header"><span class="advice-badge">理解ポイント</span><span class="advice-header-text">GANの核心</span></div><div class="advice-text"><strong>生成器と識別器が競い合い続ける</strong>ことが学習の仕組み。「片方がいなくなったら成長が止まる」というセット関係を理解しましょう。</div></div>`,

        audioFile: 'audio/paid/q20.mp3',
    deepdive: `<div class="story-block"><div class="story-lead">小説を1ページずつ読むAI</div><div class="story-text">小説を読むとき、私たちは前のページの内容を覚えながら次のページを読みますよね。前の文脈がないと、今読んでいる内容が理解できません。<br><br><strong>RNN</strong>はこの「前の情報を引き継ぐ」仕組みを持ったネットワークです。出力の一部を次のステップに折り返してフィードバックすることで、過去の情報を保持しながら処理します。<br><br>ところが、100ページ前の伏線を300ページ目で回収するような<strong>長い文脈の記憶</strong>はRNNには難しい。遠い過去の情報ほど薄れてしまうという弱点があります。<br><br>この弱点を解決したのが<strong>LSTM</strong>。「忘れるべき情報」と「覚えておくべき情報」を自動で取捨選択する仕組みを追加し、<strong>長い文脈でも重要な情報を保持</strong>できるようになりました。</div></div><div class="advice-box memory-type"><div class="advice-header"><span class="advice-badge">暗記ポイント</span><span class="advice-header-text">RNN → LSTMの進化</span></div><div class="keyword-list"><div class="keyword-item"><span class="keyword-num">①</span><div><div class="keyword-text">RNN</div><div class="keyword-note">過去を引き継いで処理。長い記憶が弱点</div></div></div><div class="keyword-item"><span class="keyword-num">②</span><div><div class="keyword-text">LSTM</div><div class="keyword-note">情報の取捨選択で長い記憶を克服</div></div></div></div></div>`,

        audioFile: 'audio/paid/q21.mp3',
    deepdive: `<div class="story-block"><div class="story-lead">教室の全員と同時に目を合わせる先生</div><div class="story-text">RNNを「1列に並んだ生徒に前から順に話しかける先生」だとすると、Transformerは「教室にいる全員と<strong>同時に目を合わせて関係性を把握できる</strong>先生」です。<br><br>「私はケーキが好きだ。それはとても甘い。」という文で、「それ」が何を指すかを理解するには、離れた場所にある「ケーキ」との関係を捉える必要があります。<br><br>RNNは順番に読んでいくので、「それ」にたどり着いたとき「ケーキ」の記憶が薄れている可能性があります。でも<strong>Self-Attention</strong>なら、文中のすべての単語ペアの関連度を一括計算。「それ」と「ケーキ」の距離に関係なく、強い関連性を即座に見つけます。<br><br>ただし並列処理のため、単語の順番が失われます。それを補うのが<strong>位置エンコーディング</strong>（各単語に位置情報を付加する技術）です。<br><br>Transformerの登場により、GPTやBERTなど現在の生成AIの基盤が生まれました。</div></div><div class="advice-box memory-type"><div class="advice-header"><span class="advice-badge">暗記ポイント</span><span class="advice-header-text">Transformerの3大キーワード</span></div><div class="keyword-list"><div class="keyword-item"><span class="keyword-num">①</span><div><div class="keyword-text">Self-Attention</div><div class="keyword-note">文中の全単語の関係を一括処理</div></div></div><div class="keyword-item"><span class="keyword-num">②</span><div><div class="keyword-text">位置エンコーディング</div><div class="keyword-note">並列処理で失われる順番を補う</div></div></div><div class="keyword-item"><span class="keyword-num">③</span><div><div class="keyword-text">Attention層</div><div class="keyword-note">注意を向けるべき場所を学習する仕組み</div></div></div></div></div>`,
    summary: `Transformerの核心は<strong>Self-Attention（全単語の関係を一括処理）</strong>と<strong>位置エンコーディング（順番の補完）</strong>。GPT・BERTの基盤です。`,

  },

    deepdive: `<div class="story-block"><div class="story-lead">「書く人」と「読む人」、同じ机から生まれた</div><div class="story-text">Transformerという机には、2つの側面があります。<br><br><strong>デコーダ側 ＝ 「書く」能力</strong><br>前の単語をもとに次の単語を予測しながら文を生成していく。<strong>GPT</strong>はこちらをベースに作られました。ChatGPTが文章を書けるのはこの仕組みのおかげです。<br><br><strong>エンコーダ側 ＝ 「読む」能力</strong><br>文章全体を双方向（前からも後ろからも）同時に読んで、文脈を深く理解する。<strong>BERT</strong>はこちらをベースにしています。<br><br>BERTの事前学習では2つの手法が使われました：<br>・<strong>MLM（マスクト・ランゲージ・モデル）</strong>：文中の一部の単語を隠して「何が入る？」と予測させる穴埋め学習<br>・<strong>NSP（次文予測）</strong>：2つの文が連続しているかどうかを判定させる学習</div></div><div class="advice-box memory-type"><div class="advice-header"><span class="advice-badge">暗記ポイント</span><span class="advice-header-text">GPT vs BERT</span></div><div class="keyword-list"><div class="keyword-item"><span class="keyword-num">①</span><div><div class="keyword-text">GPT → デコーダ</div><div class="keyword-note">テキスト生成（書くのが得意）</div></div></div><div class="keyword-item"><span class="keyword-num">②</span><div><div class="keyword-text">BERT → エンコーダ</div><div class="keyword-note">テキスト理解（読むのが得意）</div></div></div></div></div>`,

    deepdive: `<div class="story-block"><div class="story-lead">しりとりのように、一語ずつ積み上げる</div><div class="story-text">ChatGPTに「今日の天気は」と入力すると、AIは次のように考えます。<br><br>「今日の天気は」→ 次は「晴れ」が確率高い → 「今日の天気は晴れ」<br>「今日の天気は晴れ」→ 次は「です」が確率高い → 「今日の天気は晴れです」<br><br>このように、<strong>すでに出力した内容を手がかりにして、次の一語を予測する</strong>。これを繰り返して文章全体を作っていきます。<br><br>これが<strong>自己回帰モデル</strong>の基本的な仕組みです。「自己」の出力を「回帰（フィードバック）」して次を予測する、という名前の通りの動きをしています。<br><br>GPTシリーズはまさにこの自己回帰モデルで、テキストだけでなく画像や音声の生成にも同じ考え方が応用されています。</div></div><div class="advice-box understand-type"><div class="advice-header"><span class="advice-badge">理解ポイント</span><span class="advice-header-text">名前の由来で覚えよう</span></div><div class="advice-text"><strong>自己</strong>（＝自分の出力）を<strong>回帰</strong>（＝フィードバック）して次を予測。「一括処理」ではなく「順番に1つずつ」がポイントです。</div></div>`,

// ============================================================
// CHAPTERS CONFIG
// ============================================================
const chapters = [
  { id: 1, title: 'AI（人工知能）', subtitle: '第1章', questions: ch1Questions, color: '#f4a7b9', fillColor: '#e8849a', emoji: '🤖' },
  { id: 2, title: '生成AI（ジェネレーティブAI）', subtitle: '第2章', questions: ch2Questions, color: '#a8d5c2', fillColor: '#7bbfa8', emoji: '✨' },
  { id: 3, title: '生成AIの動向', subtitle: '第3章', questions: ch3Questions, color: '#c4b5e8', fillColor: '#9d8cd4', emoji: '🔥' },
  { id: 4, title: 'リテラシー・ガイドライン・AI新法', subtitle: '第4章', questions: ch4Questions, color: '#f7c4a0', fillColor: '#e09060', emoji: '⚖️' },
  { id: 5, title: 'プロンプト制作と実例', subtitle: '第5章', questions: ch5Questions, color: '#b0d4f1', fillColor: '#6aaee8', emoji: '💬' },
];

// ============================================================
// STATE
// ============================================================
let currentChapterIdx = null; // index into chapters array, or null for shuffle
let currentQuestionList = []; // questions for this session
let currentQIdx = 0;
let sessionAnswers = []; // { questionIdx (original), correct: bool }
let selectedChoice = null;
let isShuffleMode = false;

// ============================================================
// LOCALSTORAGE
// ============================================================
function getProgress(chapterId) {
  try {
    const raw = localStorage.getItem(`ch${chapterId}_progress`);
    if (!raw) return { answers: [], completed: false };
    return JSON.parse(raw);
  } catch(e) {
    return { answers: [], completed: false };
  }
}

function saveProgress(chapterId, answers, completed, qIdx) {
  try {
    localStorage.setItem(`ch${chapterId}_progress`, JSON.stringify({ answers, completed, qIdx: qIdx || 0 }));
  } catch(e) {}
}

function clearProgress(chapterId) {
  try {
    localStorage.removeItem(`ch${chapterId}_progress`);
  } catch(e) {}
}

// ============================================================
// CHAPTER SELECTION SCREEN
// ============================================================
function renderChapterSelect() {
  // Overall progress
  let totalAnswered = 0;
  let totalQuestions = 0;
  chapters.forEach(ch => {
    totalQuestions += ch.questions.length;
    const prog = getProgress(ch.id);
    totalAnswered += prog.answers.length;
  });
  document.getElementById('overallProgressText').textContent = `${totalAnswered} / ${totalQuestions}問`;
  const pct = totalQuestions > 0 ? Math.round(totalAnswered / totalQuestions * 100) : 0;
  document.getElementById('overallProgressFill').style.width = pct + '%';

  // Chapter cards
  const container = document.getElementById('chapterCards');
  container.innerHTML = '';
  chapters.forEach((ch, idx) => {
    const prog = getProgress(ch.id);
    const answered = prog.answers.length;
    const total = ch.questions.length;
    const pctCh = total > 0 ? Math.round(answered / total * 100) : 0;
    const isComplete = prog.completed;
    const isPerfect = isComplete && prog.answers.length === total && prog.answers.every(a => a.correct);

    const card = document.createElement('div');
    card.className = 'chapter-card';
    card.style.animationDelay = (idx * 0.07) + 's';
    card.style.setProperty('--ch-color', ch.color);
    card.querySelector ? null : null;

    // Left border color via ::before — we set inline style trick
    card.innerHTML = `
      <style>#chCard${ch.id}::before{background:${ch.fillColor}!important;}</style>
      <div class="chapter-card-emoji">${ch.emoji}</div>
      <div class="chapter-card-body">
        <div class="chapter-card-subtitle" style="color:${ch.fillColor};">${ch.subtitle}</div>
        <div class="chapter-card-title">${ch.title}</div>
        <div class="chapter-card-progress-row">
          <div class="chapter-card-progress-bar">
            <div class="chapter-card-progress-fill" style="width:${pctCh}%;background:${ch.fillColor};"></div>
          </div>
          <div class="chapter-card-progress-text">${answered}/${total}問</div>
        </div>
        ${(isComplete || isPerfect) ? `<div class="chapter-card-badges">
          ${isComplete ? '<span class="badge badge-complete">✓ 完了</span>' : ''}
          ${isPerfect ? '<span class="badge badge-perfect">⭐ 全問正解</span>' : ''}
        </div>` : ''}
      </div>
      <div class="chapter-card-arrow">›</div>
    `;
    card.id = `chCard${ch.id}`;
    card.onclick = () => startChapter(idx);
    container.appendChild(card);
  });
}

// ============================================================
// START CHAPTER / SHUFFLE
// ============================================================
function startChapter(chapterIdx) {
  currentChapterIdx = chapterIdx;
  isShuffleMode = false;
  const ch = chapters[chapterIdx];

  // Build question list (all questions, fresh order)
  currentQuestionList = ch.questions.map((q, i) => ({ ...q, _origIdx: i }));
  const savedProgress = getProgress(chapterIdx);
  const savedQIdx = savedProgress.qIdx || 0;
  if (savedQIdx > 0 && !savedProgress.completed) {
    const resume = confirm(`${savedQIdx + 1}問目まで進んでいます。\n続きから再開しますか？\n\n「キャンセル」で最初から始めます。`);
    currentQIdx = resume ? savedQIdx : 0;
  } else {
    currentQIdx = 0;
  }
  sessionAnswers = [];
  selectedChoice = null;

  // Show quiz screen
  document.getElementById('screenChapterSelect').classList.add('hidden');
  document.getElementById('screenQuiz').classList.remove('hidden');

  // Update header badge
  document.getElementById('quizChapterBadge').textContent = `${ch.emoji} ${ch.subtitle} ${ch.title}`;
  document.getElementById('quizChapterBadge').style.borderColor = ch.color;

  showStep(1);
}

function startShuffle() {
  currentChapterIdx = null;
  isShuffleMode = true;

  // Gather all questions with chapter info
  let all = [];
  chapters.forEach((ch, cIdx) => {
    ch.questions.forEach((q, i) => {
      all.push({ ...q, _chapterIdx: cIdx, _origIdx: i });
    });
  });
  // Fisher-Yates shuffle
  for (let i = all.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [all[i], all[j]] = [all[j], all[i]];
  }
  currentQuestionList = all;
  currentQIdx = 0;
  sessionAnswers = [];
  selectedChoice = null;

  document.getElementById('screenChapterSelect').classList.add('hidden');
  document.getElementById('screenQuiz').classList.remove('hidden');
  document.getElementById('quizChapterBadge').textContent = '🔀 全章シャッフル';
  document.getElementById('quizChapterBadge').style.borderColor = '#c4b5e8';

  showStep(1);
}

function backToChapters() {
  document.getElementById('screenQuiz').classList.add('hidden');
  document.getElementById('screenChapterSelect').classList.remove('hidden');
  renderChapterSelect();
}

function retryChapter() {
  if (isShuffleMode) {
    startShuffle();
  } else {
    startChapter(currentChapterIdx);
  }
}

// ============================================================
// QUIZ FLOW
// ============================================================
function getCurrentQ() {
  return currentQuestionList[currentQIdx];
}

function updateStepIndicator(activeStep) {
  for (let i = 1; i <= 4; i++) {
    const stepEl = document.getElementById(`ind-step${i}`);
    stepEl.className = 'step';
    if (i < activeStep) stepEl.classList.add('done');
    else if (i === activeStep) stepEl.classList.add('active');
  }
  for (let i = 1; i <= 3; i++) {
    const lineEl = document.getElementById(`ind-line${i}`);
    lineEl.className = 'step-line';
    if (i < activeStep) lineEl.classList.add('done');
  }
}

function updateProgressBar() {
  const total = currentQuestionList.length;
  const done = currentQIdx;
  const pct = total > 0 ? Math.round(done / total * 100) : 0;
  document.getElementById('quizProgressLabel').textContent = `${done + 1} / ${total}問`;
  document.getElementById('quizProgressPct').textContent = pct + '%';
  document.getElementById('quizProgressFill').style.width = pct + '%';
}

function hideAllQuizPanels() {
  ['step1','step2','stepDeepDive','step3','step4','stepComplete'].forEach(id => {
    document.getElementById(id).classList.add('hidden');
  });
}

function showStep(n) {
  hideAllQuizPanels();
  updateProgressBar();
  const q = getCurrentQ();
  const total = currentQuestionList.length;
  const qLabel = `Q${currentQIdx + 1} / ${total}`;

  if (n === 1) {
    updateStepIndicator(1);
    document.getElementById('s1-qnum').textContent = qLabel;
    document.getElementById('s1-qtext').innerHTML = q.question;
    renderChoices('s1-choices', q.choices, false);
    document.getElementById('step1').classList.remove('hidden');
    window.scrollTo(0, 0);
  } else if (n === 2) {
    showStep2Internal(q, qLabel);
  } else if (n === 3) {
    showStep3Internal(q, qLabel);
  }
}

function showStep2() {
  const q = getCurrentQ();
  const qLabel = `Q${currentQIdx + 1} / ${currentQuestionList.length}`;
  showStep2Internal(q, qLabel);
}

function showStep2Internal(q, qLabel) {
  hideAllQuizPanels();
  updateStepIndicator(2);
  document.getElementById('s2-qnum').textContent = qLabel;
  document.getElementById('s2-qtext').innerHTML = q.question;
  document.getElementById('s2-simple').innerHTML = q.simple || '';
  document.getElementById('step2').classList.remove('hidden');
  window.scrollTo(0, 0);
}

function showDeepDive() {
  const q = getCurrentQ();
  hideAllQuizPanels();
  updateStepIndicator(2);
  document.getElementById('deepdive-content').innerHTML = q.deepdive || '<p>深掘りコンテンツはありません。</p>';
  document.getElementById('stepDeepDive').classList.remove('hidden');
  window.scrollTo(0, 0);
}

function showStep3() {
  const q = getCurrentQ();
  const qLabel = `Q${currentQIdx + 1} / ${currentQuestionList.length}`;
  showStep3Internal(q, qLabel);
}

function showStep3Internal(q, qLabel) {
  hideAllQuizPanels();
  updateStepIndicator(3);
  selectedChoice = null;
  document.getElementById('s3-qnum').textContent = qLabel;
  document.getElementById('s3-qtext').innerHTML = q.question;
  renderChoices('s3-choices', q.choices, true);
  document.getElementById('answerBtn').classList.add('hidden');
  document.getElementById('step3').classList.remove('hidden');
  window.scrollTo(0, 0);
}

function showResult() {
  if (selectedChoice === null) return;
  const q = getCurrentQ();
  const isCorrect = selectedChoice === q.correct;

  // Save answer
  sessionAnswers.push({ questionIdx: currentQIdx, selectedIdx: selectedChoice, correct: isCorrect });

  // Save to localStorage (chapter mode only)
  if (!isShuffleMode && currentChapterIdx !== null) {
    const ch = chapters[currentChapterIdx];
    const prog = getProgress(ch.id);
    prog.answers = sessionAnswers;
    // completed when all done

  const isLast = currentQIdx >= currentQuestionList.length - 1;
  document.getElementById('nextBtn').textContent = isLast ? '結果を見る →' : '次の問題へ進む →';

function nextQuestion() {
  const isLast = currentQIdx >= currentQuestionList.length - 1;
  if (isLast) {
    showComplete();
  } else {
    currentQIdx++;
    selectedChoice = null;
    showStep(1);
  }
}

function showComplete() {
  hideAllQuizPanels();
  const total = currentQuestionList.length;
  const correct = sessionAnswers.filter(a => a.correct).length;
  const pct = Math.round(correct / total * 100);
  const isPerfect = correct === total;

  document.getElementById('completeIcon').textContent = isPerfect ? '🏆' : '🎊';
  document.getElementById('completeTitle').textContent = isPerfect ? '全問正解！パーフェクト！' : `${isShuffleMode ? '全章テスト' : ''}完走！お疲れさまでした`;

  document.getElementById('scoreDetail').innerHTML = `
    <div class="score-item">
      <div class="score-item-num" style="color:var(--navy);">${correct}</div>
      <div class="score-item-label">正解数</div>
    </div>
    <div class="score-item">
      <div class="score-item-num" style="color:var(--pink-deep);">${total - correct}</div>
      <div class="score-item-label">不正解数</div>
    </div>
    <div class="score-item">
      <div class="score-item-num" style="color:var(--mint-deep);">${pct}%</div>
      <div class="score-item-label">正答率</div>
    </div>
  `;

  let msg = '';
  if (pct === 100) msg = '完璧です！全問正解おめでとうございます。\n試験本番でもきっと実力が発揮できます！';
  else if (pct >= 80) msg = '素晴らしい成績です！\n不正解だった問題を中心に復習しましょう。';
  else if (pct >= 60) msg = 'もう少しで合格ラインです。\n苦手な分野を重点的に復習してみましょう。';
  else msg = '基礎をしっかり固めましょう。\nもう一度チャレンジすることで理解が深まります！';
  document.getElementById('completeMessage').textContent = msg;

  // Save completed progress
  if (!isShuffleMode && currentChapterIdx !== null) {
    const ch = chapters[currentChapterIdx];
    saveProgress(ch.id, sessionAnswers, true);
  }

  document.getElementById('stepComplete').classList.remove('hidden');
  window.scrollTo(0, 0);
}

// ============================================================
// CHOICE RENDERING
// ============================================================
function renderChoices(containerId, choices, clickable) {
  const container = document.getElementById(containerId);
  container.innerHTML = '';
  choices.forEach((text, idx) => {
    const div = document.createElement('div');
    div.className = 'choice' + (clickable ? ' clickable' : '');
    div.innerHTML = `<div class="choice-num">${idx + 1}</div><div>${text}</div>`;
    if (clickable) {
      div.onclick = () => selectChoice(idx, containerId);
    }
    container.appendChild(div);
  });
}

function selectChoice(idx, containerId) {
  selectedChoice = idx;
  const container = document.getElementById(containerId);
  container.querySelectorAll('.choice').forEach((el, i) => {
    el.classList.toggle('selected', i === idx);
  });
  document.getElementById('answerBtn').classList.remove('hidden');
}

function renderChoicesResult(containerId, choices, correctIdx, selectedIdx) {
  const container = document.getElementById(containerId);
  container.innerHTML = '';
  choices.forEach((text, idx) => {
    const div = document.createElement('div');
    let cls = 'choice';
    if (idx === correctIdx) cls += ' correct';
    else if (idx === selectedIdx) cls += ' wrong';
    div.className = cls;
    div.innerHTML = `<div class="choice-num">${idx + 1}</div><div>${text}</div>`;
    container.appendChild(div);
  });
}

let currentAudio = null;

function stopTTS() {
  if(currentAudio) {
    currentAudio.pause();
    currentAudio.currentTime = 0;
    currentAudio = null;
  }
  const btn = document.getElementById('ttsBtn');
  const icon = document.getElementById('ttsIcon');
  const label = document.getElementById('ttsBtnLabel');
  if(!btn) return;
  btn.classList.remove('playing');
  icon.innerHTML = svgPlay;
  label.textContent = '読み上げる';
}

function toggleTTS() {
  const btn = document.getElementById('ttsBtn');
  const icon = document.getElementById('ttsIcon');
  const label = document.getElementById('ttsBtnLabel');
  if(currentAudio && !currentAudio.paused) { stopTTS(); return; }
  const q = currentQuestionList[currentQIdx];
  const src = q && q.audioFile ? q.audioFile : null;
  if(!src) return;
  const audio = new Audio(src);
  currentAudio = audio;
  audio.onplay = () => {
    btn.classList.add('playing');
    icon.innerHTML = svgStop;
    label.textContent = '停止する';
  };
  audio.onended = audio.onerror = () => stopTTS();
  audio.play();
}
